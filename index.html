<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JamBoo — Quiz Generator 9000</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   BASE
═══════════════════════════════ */
:root{
  --bg:#07071A;
  --panel:#0D0D22;
  --module:#080818;
  --b1:#6600FF;
  --b2:#AA00FF;
  --cyan:#00FFFF;
  --green:#00FF41;
  --pink:#FF00FF;
  --yellow:#FFD700;
  --red:#FF2244;
  --text:#FFFFFF;
  --dim:rgba(255,255,255,.35);
  --fp:'Press Start 2P',monospace;
  --row-border: rgba(102,0,255,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--fp);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:0 0 80px;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(102,0,255,.09) 1px,transparent 1px);
  background-size:24px 24px;
}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
.hdr{
  background:linear-gradient(135deg,
    rgba(18,5,28,.93) 0%,
    rgba(90,0,65,.82) 30%,
    rgba(12,5,32,.93) 60%,
    rgba(100,0,80,.78) 100%
  );
  background-size:320% 320%;
  animation:hdrMorph 9s ease-in-out infinite;
  backdrop-filter:blur(16px) saturate(1.6);
  border-bottom:3px solid rgba(255,0,255,.6);
  box-shadow:0 0 42px rgba(255,0,255,.2), 0 5px 14px rgba(255,0,255,.32), inset 0 1px 0 rgba(255,255,255,.07);
  height:110px;
  display:flex;align-items:center;
  position:sticky;top:0;overflow:visible;z-index:100;
  transition:height .35s ease;
}
@keyframes hdrMorph{
  0%  {background-position:0%   50%;}
  33% {background-position:100% 20%;}
  66% {background-position:70%  100%;}
  100%{background-position:0%   50%;}
}
.hdr.hdr-scrolled{
  height:77px;
}
.hdr::before{
  content:'';position:absolute;inset:0;pointer-events:none;overflow:hidden;
  background:
    radial-gradient(ellipse 55% 200% at 22% 50%, rgba(255,0,180,.22) 0%, transparent 65%),
    radial-gradient(ellipse 45% 180% at 80% 50%, rgba(200,0,255,.18) 0%, transparent 65%),
    radial-gradient(rgba(255,255,255,.55) 1px,transparent 1px),
    radial-gradient(rgba(255,0,255,.38) 1px,transparent 1px);
  background-size:auto,auto,58px 46px,105px 82px;
  background-position:0 0,0 0,12px 10px,44px 26px;
  animation:hdrBlobs 8s ease-in-out infinite alternate;
}
@keyframes hdrBlobs{
  0%  {opacity:.75;transform:scaleX(1);}
  100%{opacity:1;  transform:scaleX(1.09);}
}
.hdr-inner{
  position:relative;z-index:2;width:100%;
  display:flex;align-items:flex-end;justify-content:center;
  padding:0 24px 8px;
}
.hdr-logo{
  height:210px;width:auto;
  position:fixed;left:50%;top:0;z-index:200;
  filter:drop-shadow(0 10px 28px rgba(0,0,0,.9)) drop-shadow(0 0 18px rgba(102,0,255,.4));
  cursor:pointer;image-rendering:pixelated;
  animation:moonBalance 6s ease-in-out infinite;
  transform-origin:center bottom;
}
@keyframes moonBalance{
  0%   { transform:translateX(-50%) translateY(0)    rotate(0deg);    }
  15%  { transform:translateX(-50%) translateY(-7px) rotate(1.4deg);  }
  30%  { transform:translateX(-50%) translateY(-3px) rotate(-0.6deg); }
  45%  { transform:translateX(-50%) translateY(-9px) rotate(1.8deg);  }
  60%  { transform:translateX(-50%) translateY(-4px) rotate(-0.4deg); }
  75%  { transform:translateX(-50%) translateY(-7px) rotate(1.2deg);  }
  90%  { transform:translateX(-50%) translateY(-2px) rotate(-0.3deg); }
  100% { transform:translateX(-50%) translateY(0)    rotate(0deg);    }
}
.hdr-logo:hover{
  animation:none;
  transform:translateX(-50%) scale(1.05) translateY(-8px);
  filter:drop-shadow(0 14px 32px rgba(0,0,0,.9)) drop-shadow(0 0 28px var(--cyan));
  transition:transform .3s ease, filter .3s ease;
}

/* ═══════════════════════════════
   BURGER MENU
═══════════════════════════════ */
.burger-wrap{position:absolute;right:20px;top:50%;transform:translateY(-50%);z-index:30;}
.burger-btn{
  width:36px;height:36px;
  background:#14143A;border:3px solid #2A2A55;box-shadow:3px 3px 0 #000;
  color:var(--dim);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .08s;position:relative;z-index:31;
}
.burger-btn:hover,.burger-btn.open{border-color:var(--cyan);color:var(--cyan);}
.lang-menu{
  display:none;position:absolute;right:0;top:calc(100% + 4px);
  background:#14143A;border:3px solid var(--b1);box-shadow:4px 4px 0 #000;
  z-index:32;min-width:110px;
}
.lang-menu.open{display:block;}
.lang-option{
  display:block;width:100%;padding:9px 14px;
  background:transparent;border:none;border-bottom:2px solid #2A1166;
  color:rgba(255,255,255,.55);font-family:var(--fp);font-size:7px;
  cursor:pointer;text-align:left;transition:all .08s;white-space:nowrap;
}
.lang-option:last-child{border-bottom:none;}
.lang-option:hover,.lang-option.active{
  background:var(--b1);color:#fff;text-shadow:0 0 10px var(--cyan);
}

/* ═══════════════════════════════
   PAGE BODY
═══════════════════════════════ */
.synth-body{
  position:relative;z-index:1;
  padding:54px 0 0; /* top only — let content be truly full-width */
}
.synth-title{text-align:center;padding:18px 0 24px;}
.synth-title span{
  display:block;font-size:clamp(9px,2vw,14px);
  color:var(--cyan);text-shadow:0 0 18px var(--cyan),3px 3px 0 var(--b1);
  letter-spacing:2px;
}
.synth-title small{
  display:block;font-size:6px;color:var(--dim);letter-spacing:4px;margin-top:10px;
}

/* ═══════════════════════════════
   CONFIG ROWS  (full-width, no box)
═══════════════════════════════ */
.config-grid{
  width:100%;
  border-top:1px solid var(--row-border);
  margin-bottom:32px;
}
.config-row{
  display:flex;flex-direction:column;align-items:center;
  gap:16px;
  padding:28px 80px;
  border-bottom:1px solid var(--row-border);
  transition:background .12s;
  text-align:center;
}
.config-row:nth-child(odd){background:rgba(13,13,34,.55);}
.config-row:nth-child(even){background:rgba(8,8,24,.55);}
.config-row:hover{background:rgba(20,10,50,.7);}

.config-row-lbl{
  font-size:12px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(0,255,255,.92);
  text-shadow:0 0 16px var(--cyan),2px 2px 0 rgba(102,0,255,.55);
  width:100%;text-align:center;line-height:1.6;
}

.config-btn-group{
  width:100%;display:flex;gap:8px;justify-content:center;
}

/* ─── pixel selection button ─── */
.cfg-btn{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;
  padding:20px 8px;
  background:rgba(8,8,28,.9);
  border:2px solid rgba(102,0,255,.3);
  color:rgba(255,255,255,.5);
  font-family:var(--fp);
  text-transform:uppercase;text-align:center;
  cursor:pointer;
  transition:border-color .12s, color .12s, background .12s,
             transform .12s, box-shadow .12s;
  position:relative;overflow:hidden;
}
.btn-main{
  font-size:21px;letter-spacing:1px;
  color:inherit;line-height:1.2;
}
.btn-sub{
  font-size:7px;letter-spacing:1px;
  color:rgba(255,255,255,.35);
  text-transform:lowercase;line-height:1.4;
}
.cfg-btn.active .btn-sub{color:rgba(0,255,255,.6);}
.cfg-btn:hover:not(.active) .btn-sub{color:rgba(255,255,255,.5);}
/* subtle scanline texture on buttons */
.cfg-btn::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,rgba(0,0,0,.1) 0px,rgba(0,0,0,.1) 1px,transparent 1px,transparent 4px
  );
}
.cfg-btn:hover:not(.active){
  border-color:rgba(0,255,255,.7);
  color:#fff;
  background:rgba(0,255,255,.07);
  transform:translateY(-3px);
  box-shadow:0 6px 18px rgba(0,255,255,.18), 0 0 0 1px rgba(0,255,255,.12);
}
.cfg-btn.active{
  background:linear-gradient(160deg,rgba(102,0,255,.55) 0%,rgba(0,200,255,.18) 100%);
  border-color:var(--cyan);
  color:#fff;
  text-shadow:0 0 14px var(--cyan),0 0 4px #fff;
  box-shadow:0 0 22px rgba(0,255,255,.28), inset 0 0 14px rgba(0,255,255,.08);
  transform:none;
}
.cfg-btn.active::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--cyan);box-shadow:0 0 8px var(--cyan);
}

/* ─── mode toggle buttons ─── */
.mode-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:12px 8px;
}
.mode-btn .mode-ico{font-size:14px;line-height:1;}
.mode-btn .mode-lbl{font-size:6px;letter-spacing:1px;}
.mode-btn .mode-desc{font-size:5px;color:rgba(255,255,255,.35);letter-spacing:1px;}
.mode-btn.on .mode-desc{color:rgba(0,255,255,.6);}

/* ═══════════════════════════════
   LED MATRIX GRID PICKER
═══════════════════════════════ */
.config-row-grid{padding-top:28px;padding-bottom:28px;}
.grid-area{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;}
.led-matrix{display:grid;gap:4px;cursor:crosshair;user-select:none;}
.led-cell{
  width:26px;height:26px;
  background:#07071E;border:2px solid rgba(102,0,255,.2);
  transition:background .05s,border-color .05s;
}
.led-cell.hover{background:rgba(0,255,255,.18);border-color:rgba(0,255,255,.55);}
.led-cell.sel{
  background:rgba(0,255,255,.22);border-color:var(--cyan);
  box-shadow:inset 0 0 5px rgba(0,255,255,.3);
}
.matrix-readout{text-align:center;}
.matrix-main{font-size:13px;color:var(--cyan);text-shadow:2px 2px 0 var(--b1),0 0 14px var(--cyan);margin-bottom:6px;}
.matrix-sub{font-size:6px;color:var(--dim);letter-spacing:2px;}

/* ═══════════════════════════════
   CONTENT AREA (team names + prompt)
═══════════════════════════════ */
.content-area{
  max-width:900px;margin:0 auto;padding:0 64px;
}

/* team inputs */
.team-row-wrap{margin-bottom:20px;}
.team-row-label{
  font-size:7px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(0,255,255,.7);padding-bottom:8px;margin-bottom:12px;
  border-bottom:1px solid var(--row-border);
  display:flex;align-items:center;gap:8px;
}
.team-row-dot{
  width:6px;height:6px;background:var(--pink);
  box-shadow:0 0 8px var(--pink);flex-shrink:0;
  animation:blink .8s step-end infinite;
}
.lcd-strips{
  display:flex;flex-wrap:wrap;justify-content:center;gap:10px;
}
.lcd-strip{
  display:flex;align-items:center;gap:6px;
  padding:16px 24px;min-width:240px;
  background:#160616;
  border:2px solid rgba(255,0,255,.28);
  border-left:4px solid var(--tc,var(--pink));
  animation:inputPulse 2.4s ease-in-out infinite;
}
@keyframes inputPulse{
  0%,100%{box-shadow:none;}
  50%{box-shadow:0 0 18px rgba(255,0,255,.14);}
}
.lcd-strip input{
  flex:1;background:transparent;border:none;outline:none;
  color:#FF77CC;font-family:var(--fp);font-size:16px;
  caret-color:#FF77CC;min-width:0;
}
.lcd-strip input::placeholder{color:rgba(255,0,255,.3);}

/* AI prompt */
.prompt-wrap{margin-bottom:20px;}
.prompt-label{
  font-size:7px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(0,255,255,.7);padding-bottom:8px;margin-bottom:12px;
  border-bottom:1px solid var(--row-border);
  display:flex;align-items:center;gap:8px;
}
.lcd-cursor{
  display:inline-block;width:8px;height:10px;
  background:#FF77CC;margin-left:4px;vertical-align:middle;
  animation:blink .9s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.lcd-screen{
  position:relative;background:#160616;
  border:2px solid rgba(255,0,255,.28);overflow:hidden;
  animation:promptPulse 3s ease-in-out infinite;
}
@keyframes promptPulse{
  0%,100%{border-color:rgba(255,0,255,.22);}
  50%{border-color:rgba(255,0,255,.6);box-shadow:0 0 22px rgba(255,0,255,.12);}
}
.lcd-screen::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(
    0deg,rgba(0,0,0,.12) 0px,rgba(0,0,0,.12) 1px,
    transparent 1px,transparent 3px
  );
}
.lcd-ta{
  display:block;width:100%;min-height:160px;
  padding:28px 32px;
  background:transparent;border:none;outline:none;
  color:#FF77CC;font-family:var(--fp);font-size:18px;line-height:2;
  resize:vertical;caret-color:#FF77CC;position:relative;z-index:1;
}
.lcd-ta::placeholder{color:rgba(255,0,255,.3);}

/* ═══════════════════════════════
   LAUNCH BUTTON
═══════════════════════════════ */
.launch-wrap{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding:4px 0 8px;
}
.launch-label{
  font-size:7px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(255,120,255,.6);animation:blink 1.2s step-end infinite;
  text-shadow:0 0 10px rgba(255,0,255,.4);
}
.btn-launch{
  position:relative;overflow:hidden;
  width:100%;padding:22px 24px;
  background:linear-gradient(135deg,
    rgba(20,5,30,.92) 0%, rgba(95,0,68,.82) 35%,
    rgba(14,5,34,.92) 65%, rgba(105,0,82,.76) 100%
  );
  background-size:320% 320%;
  animation:hdrMorph 9s ease-in-out infinite;
  backdrop-filter:blur(14px) saturate(1.5);
  border:2px solid rgba(255,0,255,.55);
  border-bottom:3px solid rgba(255,0,255,.85);
  box-shadow:0 0 32px rgba(255,0,255,.22), 0 6px 20px rgba(255,0,255,.28), inset 0 1px 0 rgba(255,255,255,.08);
  color:#fff;font-family:var(--fp);font-size:12px;letter-spacing:4px;
  text-shadow:0 0 18px rgba(255,120,255,.9), 0 0 4px #fff;
  text-transform:uppercase;cursor:pointer;
  transition:box-shadow .15s ease, transform .08s ease;
}
.btn-launch::before{
  content:'';
  position:absolute;top:0;bottom:0;
  left:50%;width:6px;
  transform:translateX(-50%);
  background:radial-gradient(ellipse at center, rgba(255,180,255,.95) 0%, rgba(255,0,255,.5) 45%, transparent 100%);
  filter:blur(10px);
  animation:btnPulse 2.4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes btnPulse{
  0%,100%{ width:6px;   opacity:0; }
  15%    { width:6px;   opacity:1; }
  55%    { width:130%;  opacity:.55; }
  88%    { width:140%;  opacity:0; }
}
.btn-launch:hover{
  transform:translateY(-3px);
  box-shadow:0 0 55px rgba(255,0,255,.5), 0 10px 26px rgba(255,0,255,.4), inset 0 1px 0 rgba(255,255,255,.12);
  text-shadow:0 0 24px rgba(255,180,255,1), 0 0 8px #fff;
}
.btn-launch:active{transform:translateY(1px);box-shadow:0 0 20px rgba(255,0,255,.3), inset 0 2px 8px rgba(0,0,0,.3);}
.btn-launch:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ═══════════════════════════════
   SPLASH
═══════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:99999;background:var(--bg);
  display:flex;align-items:center;justify-content:center;pointer-events:none;
}
#splash.hide{animation:splashOut .4s steps(6) forwards;}
@keyframes splashOut{0%{opacity:1;}100%{opacity:0;}}
.splash-logo{
  height:160px;width:auto;animation:splashFloat 1.8s ease-in-out forwards;
  image-rendering:pixelated;
  filter:drop-shadow(0 0 18px var(--cyan)) drop-shadow(4px 4px 0 var(--b1));
}
@keyframes splashFloat{
  0%  {transform:translateY(0)    scale(1)    rotate(-1deg);}
  20% {transform:translateY(-10px)scale(1.04) rotate(1deg);}
  40% {transform:translateY(4px)  scale(.98)  rotate(-.5deg);}
  60% {transform:translateY(-6px) scale(1.02) rotate(.8deg);}
  80% {transform:translateY(2px)  scale(1)    rotate(0deg);}
  100%{transform:translateY(0)    scale(1)    rotate(0deg);}
}

/* ═══════════════════════════════
   LOADING OVERLAY
═══════════════════════════════ */
.loading-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(7,7,26,.97);z-index:9999;
  flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
.loading-overlay.active{display:flex;}
.load-logo{height:100px;animation:logoPulse 1s step-end infinite;}
@keyframes logoPulse{
  0%,100%{filter:drop-shadow(0 0 8px var(--cyan));}
  50%{filter:drop-shadow(0 0 22px var(--cyan)) drop-shadow(4px 4px 0 var(--b1));}
}
.load-bar-wrap{width:200px;height:6px;background:#111;border:2px solid var(--cyan);}
.load-bar{height:100%;background:var(--cyan);animation:sweep 1s linear infinite;}
@keyframes sweep{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
.load-text{font-size:7px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;}

/* ═══════════════════════════════
   FLOOR GRID
═══════════════════════════════ */
.grid-floor{
  position:fixed;bottom:0;left:0;right:0;height:64px;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(102,0,255,.1) 1px,transparent 1px),
    linear-gradient(90deg,rgba(102,0,255,.1) 1px,transparent 1px);
  background-size:20px 20px;
  transform:perspective(200px) rotateX(62deg);transform-origin:bottom;opacity:.5;
}

/* ═══════════════════════════════
   COMETS
═══════════════════════════════ */
#comet-canvas{
  position:fixed;inset:0;
  pointer-events:none;z-index:1;
  width:100%;height:100%;
}

/* ═══════════════════════════════
   RESPONSIVE
═══════════════════════════════ */
@media(max-width:700px){
  .hdr-logo{height:150px;}
  .synth-body{padding-top:44px;}
  .config-row{padding:20px 24px;gap:12px;}
  .content-area{padding:0 24px;}
  .config-row-lbl{font-size:9px;}
  .content-area{padding:0 16px;}
}
@media(max-width:400px){
  .hdr-logo{height:120px;margin-bottom:-22px;}
  .cfg-btn{font-size:6px;padding:10px 4px;}
}
</style>
</head>
<body>

<!-- SPLASH -->
<canvas id="comet-canvas"></canvas>

<div id="splash">
  <img class="splash-logo" src="Jamboo-logo-png.png" alt="JamBoo">
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <img class="load-logo" src="Jamboo-logo-png.png" alt="JamBoo">
  <div class="load-bar-wrap"><div class="load-bar"></div></div>
  <p class="load-text" id="load-text">Generating...</p>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <img class="hdr-logo" src="Jamboo-logo-png.png" alt="JamBoo" onclick="window.scrollTo(0,0)">
  </div>
  <div class="burger-wrap">
    <button class="burger-btn" id="burger-btn" onclick="toggleLangMenu()">☰</button>
    <div class="lang-menu" id="lang-menu">
      <button class="lang-option active" id="lang-en" onclick="setLang('en')">🇬🇧 EN</button>
      <button class="lang-option" id="lang-pt" onclick="setLang('pt')">🇧🇷 PT</button>
      <button class="lang-option" id="lang-es" onclick="setLang('es')">🇪🇸 ES</button>
    </div>
  </div>
</header>

<div class="synth-body">

  <div class="synth-title">
    <span id="page-title">CREATE YOUR CHALLENGE!</span>
    <small>★ JAMBOO QUIZ GENERATOR 9000 ★</small>
  </div>

  <!-- ══ CONFIG ROWS (full-width, no bounding box) ══ -->
  <div class="config-grid" id="config-grid">

    <!-- ROW 1: PLAYERS -->
    <div class="config-row">
      <div class="config-row-lbl" data-i18n="teamsTitle">PLAYERS</div>
      <div class="config-btn-group" id="teams-btns"></div>
    </div>

    <!-- ROW 2: BOARD SIZE -->
    <div class="config-row config-row-grid">
      <div class="config-row-lbl" data-i18n="gridTitle">BOARD SIZE</div>
      <div class="grid-area">
        <div class="led-matrix" id="gp-grid"></div>
        <div class="matrix-readout">
          <div class="matrix-main" id="gp-label">4 × 3</div>
          <div class="matrix-sub" id="gp-sublabel">12 questions</div>
        </div>
      </div>
    </div>

    <!-- ROW 3: DIFFICULTY -->
    <div class="config-row">
      <div class="config-row-lbl" data-i18n="diffTitle">DIFFICULTY</div>
      <div class="config-btn-group" id="diff-btns"></div>
    </div>

    <!-- ROW 4: QUESTION TYPE -->
    <div class="config-row">
      <div class="config-row-lbl" data-i18n="qtypeTitle">QUESTION</div>
      <div class="config-btn-group" id="qtype-btns"></div>
    </div>


    <!-- ROW: TEAM NAMES -->
    <div class="config-row">
      <div class="config-row-lbl" data-i18n="teamNamesLabel">TEAM NAMES</div>
      <div class="lcd-strips" id="team-inputs"></div>
    </div>

    <!-- ROW: AI PROMPT -->

      <div class="config-row-lbl">
        <span data-i18n="promptTitle">ENTER YOUR QUEST</span>
        <span class="lcd-cursor"></span>
      </div>
      <div class="lcd-screen" style="width:100%">
        <textarea class="lcd-ta" id="ai-prompt" placeholder="> Describe your quiz..."></textarea>
      </div>
    </div>

  </div><!-- /config-grid -->

  <div class="launch-wrap" style="padding:24px 80px 8px;">
    <div class="launch-label" data-i18n="launchLabel">◄ PRESS START ►</div>
    <button class="btn-launch" id="gen-btn" onclick="startGame()">
      ▶ &nbsp;<span data-i18n="startBtn">START GAME</span>
    </button>
  </div>

</div><!-- /synth-body -->

<div class="grid-floor"></div>

<script>
/* ══════════ I18N ══════════ */
const T={
  en:{
    pageTitle:'CREATE YOUR CHALLENGE!',
    teamsTitle:'PLAYERS', gridTitle:'BOARD SIZE',
    diffTitle:'DIFFICULTY', qtypeTitle:'QUESTION TYPE',
    diff0:'EASY',    diff0desc:'beginner level',
    diff1:'MED',     diff1desc:'grade standard',
    diff2:'HARD',    diff2desc:'advanced',
    diff3:'MIX',     diff3desc:'all levels',
    qt0:'M.C.',      qt0desc:'multiple choice',

    qt2:'DRAW',      qt2desc:'draw the answer',
    qt3:'MIX',       qt3desc:'all types mixed',
    teamNamesLabel:'TEAM NAMES',
    promptTitle:'ENTER YOUR QUEST',
    launchLabel:'◄ PRESS START ►', startBtn:'START GAME',
    promptPH:'> Describe your quiz... e.g. French Revolution for 9th grade students',
    noPrompt:'Please describe your quiz topic!',
    generating:'Generating your game...',
    teamDefaults:['Team 1','Team 2','Team 3','Team 4','Team 5','Team 6','Team 7','Team 8'],
    soloDefault:'Player 1', soloDesc:'solo mode', teamsWord:'teams',
    questions:'questions', solo:'1P',
  },
  pt:{
    pageTitle:'CRIE SEU DESAFIO!',
    teamsTitle:'JOGADORES', gridTitle:'TAMANHO DO BOARD',
    diffTitle:'DIFICULDADE', qtypeTitle:'TIPO DE QUESTÃO',
    diff0:'FÁCIL',   diff0desc:'nível básico',
    diff1:'MÉDIO',   diff1desc:'padrão escolar',
    diff2:'DIFÍCIL', diff2desc:'avançado',
    diff3:'MISTO',   diff3desc:'todos os níveis',
    qt0:'M.E.',      qt0desc:'múltipla escolha',
    qt1:'ABERTA',    qt1desc:'resposta aberta',
    qt2:'DRAW',      qt2desc:'desenhar a resposta',
    qt3:'MIX',       qt3desc:'todos os tipos',
    teamNamesLabel:'NOMES DOS TIMES',
    promptTitle:'SUA MISSÃO',
    launchLabel:'◄ PRESSIONE START ►', startBtn:'INICIAR JOGO',
    promptPH:'> Descreva seu quiz... ex: Revolução Francesa para o 9º ano',
    noPrompt:'Por favor, descreva o tema do quiz!',
    generating:'Gerando seu jogo...',
    teamDefaults:['Time 1','Time 2','Time 3','Time 4','Time 5','Time 6','Time 7','Time 8'],
    soloDefault:'Jogador 1', soloDesc:'modo solo', teamsWord:'times',
    questions:'perguntas', solo:'1J',
  },
  es:{

    teamsTitle:'JUGADORES', gridTitle:'TAMAÑO DEL BOARD',
    diffTitle:'DIFICULTAD', qtypeTitle:'TIPO DE PREGUNTA',
    diff0:'FÁCIL',   diff0desc:'nivel básico',
    diff1:'MEDIO',   diff1desc:'estándar',
    diff2:'DIFÍCIL', diff2desc:'avanzado',
    diff3:'MIXTO',   diff3desc:'todos los niveles',
    qt0:'M.O.',      qt0desc:'opción múltiple',
    qt1:'ABIERTA',   qt1desc:'respuesta abierta',
    qt2:'DIBUJO',    qt2desc:'dibuja la respuesta',
    qt3:'MIX',       qt3desc:'todos los tipos',
    teamNamesLabel:'NOMBRES DE EQUIPOS',
    promptTitle:'TU MISIÓN',
    launchLabel:'◄ PRESIONA START ►', startBtn:'INICIAR JUEGO',
    promptPH:'> Describe tu quiz... ej: Revolución Francesa para 9° grado',
    noPrompt:'¡Por favor describe el tema de tu quiz!',
    generating:'Generando tu juego...',
    teamDefaults:['Equipo 1','Equipo 2','Equipo 3','Equipo 4','Equipo 5','Equipo 6','Equipo 7','Equipo 8'],
    soloDefault:'Jugador 1', soloDesc:'modo solo', teamsWord:'equipos',
    questions:'preguntas', solo:'1J',
  }
};

const TEAM_COLORS=['#00FFCC','#FF00BB','#BF00FF','#F5C518','#00D1FF','#FB923C','#34D399','#F472B6'];
const TEAMS_OPTS=[
  {val:'solo',labelKey:'solo'},
  {val:2,label:'2'},{val:3,label:'3'},{val:4,label:'4'},
  {val:5,label:'5'},{val:6,label:'6'},{val:8,label:'8'},
];

/* ══════════ STATE ══════════ */
let lang='en';
let numTeams=4, numCols=4, numRows=3;
let difficulty='easy', qType='multiple';
let teams=[];
let soloMode=false;

/* ══════════ INIT ══════════ */
function init(){
  teams=T[lang].teamDefaults.map((n,i)=>({name:n,color:TEAM_COLORS[i]}));
  renderTeamInputs();
  initGridPicker();
  renderConfigBtns();
  applyI18n();
}

/* ══════════ LANG ══════════ */
function toggleLangMenu(){
  const menu=document.getElementById('lang-menu');
  const btn=document.getElementById('burger-btn');
  const open=menu.classList.toggle('open');
  btn.classList.toggle('open',open);
}
function setLang(l){
  lang=l;
  document.getElementById('lang-menu').classList.remove('open');
  document.getElementById('burger-btn').classList.remove('open');
  ['en','pt','es'].forEach(x=>document.getElementById('lang-'+x).classList.toggle('active',x===l));
  applyI18n();
}
document.addEventListener('click',function(e){
  const wrap=document.querySelector('.burger-wrap');
  if(wrap&&!wrap.contains(e.target)){
    document.getElementById('lang-menu').classList.remove('open');
    document.getElementById('burger-btn').classList.remove('open');
  }
});

function applyI18n(){
  const d=T[lang];
  document.getElementById('page-title').textContent=d.pageTitle;
  document.getElementById('ai-prompt').placeholder=d.promptPH;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(d[k]!==undefined) el.textContent=d[k];
  });
  renderConfigBtns();
  updateGridLabel();
  renderTeamInputs();
}

/* ══════════ CONFIG BUTTONS ══════════ */
function makeBtn(main, sub, active, onclick){
  const b=document.createElement('button');
  b.className='cfg-btn'+(active?' active':'');
  b.innerHTML=`<span class="btn-main">${main}</span><span class="btn-sub">${sub}</span>`;
  b.onclick=onclick;
  return b;
}

function renderConfigBtns(){
  const d=T[lang];

  // Teams
  const tg=document.getElementById('teams-btns');
  tg.innerHTML='';
  TEAMS_OPTS.forEach(opt=>{
    const active=(opt.val==='solo'&&soloMode)||(opt.val===numTeams&&!soloMode);
    const label=opt.labelKey?d[opt.labelKey]:opt.label;
    const sub=opt.val==='solo'?d.soloDesc:(opt.val+' '+d.teamsWord);
    tg.appendChild(makeBtn(label,sub,active,()=>{
      if(opt.val==='solo'){soloMode=true;numTeams=1;}
      else{soloMode=false;numTeams=opt.val;}
      renderConfigBtns();renderTeamInputs();
    }));
  });

  // Difficulty
  const dg=document.getElementById('diff-btns');
  dg.innerHTML='';
  ['easy','medium','hard','mixed'].forEach((val,i)=>{
    dg.appendChild(makeBtn(d['diff'+i],d['diff'+i+'desc'],difficulty===val,()=>{
      difficulty=val;renderConfigBtns();
    }));
  });

  // Question type
  const qg=document.getElementById('qtype-btns');
  qg.innerHTML='';
  ['multiple','open','drawing','mixed'].forEach((val,i)=>{
    qg.appendChild(makeBtn(d['qt'+i],d['qt'+i+'desc'],qType===val,()=>{
      qType=val;renderConfigBtns();
    }));
  });
}

/* ══════════ GRID PICKER ══════════ */
const GP_COLS=8, GP_ROWS=6;
function initGridPicker(){
  const grid=document.getElementById('gp-grid');
  grid.style.gridTemplateColumns=`repeat(${GP_COLS},1fr)`;
  grid.innerHTML='';
  for(let r=0;r<GP_ROWS;r++){
    for(let c=0;c<GP_COLS;c++){
      const cell=document.createElement('div');
      cell.className='led-cell';
      cell.dataset.c=c;cell.dataset.r=r;
      cell.addEventListener('mouseenter',()=>highlightGrid(c,r,false));
      cell.addEventListener('click',()=>{numCols=c+1;numRows=r+1;highlightGrid(c,r,true);updateGridLabel();});
      grid.appendChild(cell);
    }
  }
  grid.addEventListener('mouseleave',()=>highlightGrid(numCols-1,numRows-1,true));
  highlightGrid(numCols-1,numRows-1,true);
  updateGridLabel();
}
function highlightGrid(maxC,maxR,perm){
  document.querySelectorAll('.led-cell').forEach(cell=>{
    const c=+cell.dataset.c,r=+cell.dataset.r;
    const inside=c<=maxC&&r<=maxR;
    cell.classList.toggle('hover',inside&&!perm);
    cell.classList.toggle('sel',inside&&perm);
  });
  if(!perm){
    document.getElementById('gp-label').textContent=`${maxC+1} × ${maxR+1}`;
    document.getElementById('gp-sublabel').textContent=`${(maxC+1)*(maxR+1)} ${T[lang].questions}`;
  }
}
function updateGridLabel(){
  document.getElementById('gp-label').textContent=`${numCols} × ${numRows}`;
  document.getElementById('gp-sublabel').textContent=`${numCols*numRows} ${T[lang].questions}`;
  highlightGrid(numCols-1,numRows-1,true);
}

/* ══════════ TEAM INPUTS ══════════ */
function renderTeamInputs(){
  const g=document.getElementById('team-inputs');
  g.innerHTML='';
  const d=T[lang];
  const count=soloMode?1:numTeams;
  for(let i=0;i<count;i++){
    const def=soloMode?d.soloDefault:d.teamDefaults[i];
    if(!teams[i]) teams[i]={name:def,color:TEAM_COLORS[i]};
    const wrap=document.createElement('div');
    wrap.className='lcd-strip';
    wrap.style.setProperty('--tc',TEAM_COLORS[i]);
    const inp=document.createElement('input');
    inp.type='text';inp.value=teams[i].name;inp.placeholder=def;
    inp.oninput=e=>teams[i].name=e.target.value;
    wrap.appendChild(inp);
    g.appendChild(wrap);
  }
}

/* ══════════ START ══════════ */
function startGame(){
  const prompt=document.getElementById('ai-prompt').value.trim();
  if(!prompt){alert(T[lang].noPrompt);return;}
  const qLang={en:'English',pt:'Portuguese',es:'Spanish'}[lang];
  const count=soloMode?1:numTeams;
  const config={
    numTeams:count,numRows,numCols,difficulty,qType,
    teams:teams.slice(0,count),
    lang,qLang,
    timerOn:true,speedOn:false,
    soloMode,prompt
  };
  document.getElementById('load-text').textContent=T[lang].generating;
  document.getElementById('loading').classList.add('active');
  document.getElementById('gen-btn').disabled=true;
  localStorage.setItem('jamboo_config',JSON.stringify(config));
  window.location.href='game.html';
}

init();

// Comet particles
(function(){
  const cvs=document.getElementById('comet-canvas');
  const ctx=cvs.getContext('2d');
  const COLS=['#00FFFF','#FF00FF','#AA00FF','#6600FF','#FFD700'];
  const NUM=20;
  let W,H;
  function resize(){W=cvs.width=window.innerWidth;H=cvs.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize,{passive:true});
  function rnd(a,b){return a+Math.random()*(b-a);}
  function spawn(){
    const angle=rnd(0,Math.PI*2);
    const spd=rnd(1.2,3.5);
    let x,y;
    if(Math.random()<0.5){x=Math.random()<0.5?-10:W+10;y=rnd(0,H);}
    else{x=rnd(0,W);y=Math.random()<0.5?-10:H+10;}
    return{x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,
      size:rnd(1.2,2.8),col:COLS[0|rnd(0,COLS.length)],
      trail:[],tLen:0|rnd(24,55),alpha:rnd(0.45,0.85)};
  }
  const comets=Array.from({length:NUM},spawn);
  comets.forEach(c=>{c.x=rnd(0,W);c.y=rnd(0,H);});
  function tick(){
    ctx.clearRect(0,0,W,H);
    comets.forEach(c=>{
      c.trail.push({x:c.x,y:c.y});
      if(c.trail.length>c.tLen)c.trail.shift();
      const tl=c.trail.length;
      for(let i=0;i<tl;i++){
        const p=c.trail[i];const f=i/tl;
        ctx.beginPath();ctx.arc(p.x,p.y,c.size*f*0.8,0,Math.PI*2);
        ctx.fillStyle=c.col;ctx.globalAlpha=f*c.alpha*0.45;ctx.fill();
      }
      ctx.beginPath();ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
      ctx.fillStyle=c.col;ctx.globalAlpha=c.alpha;ctx.fill();
      ctx.globalAlpha=1;
      c.x+=c.vx;c.y+=c.vy;
      if(c.x<-70||c.x>W+70||c.y<-70||c.y>H+70)Object.assign(c,spawn());
    });
    requestAnimationFrame(tick);
  }
  tick();
})();

// Sticky header scroll-shrink
(function(){
  const hdr=document.querySelector('.hdr');
  let ticking=false;
  window.addEventListener('scroll',function(){
    if(!ticking){
      requestAnimationFrame(function(){
        if(window.scrollY>10) hdr.classList.add('hdr-scrolled');
        else hdr.classList.remove('hdr-scrolled');
        ticking=false;
      });
      ticking=true;
    }
  },{passive:true});
})();

// Splash
(function(){
  const splash=document.getElementById('splash');
  setTimeout(function(){
    splash.classList.add('hide');
    splash.addEventListener('animationend',function(){splash.style.display='none';},{once:true});
  },1900);
})();
</script>
