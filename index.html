<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JamBoo — Quiz Generator 9000</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   BASE
═══════════════════════════════ */
:root{
  --bg:#07071A;
  --panel:#0D0D22;
  --module:#101026;
  --b1:#6600FF;
  --b2:#AA00FF;
  --cyan:#00FFFF;
  --green:#00FF41;
  --pink:#FF00FF;
  --yellow:#FFD700;
  --red:#FF2244;
  --text:#FFFFFF;
  --dim:rgba(255,255,255,.38);
  --fp:'Press Start 2P',monospace;
  --fmono:'Press Start 2P',monospace;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:var(--fp);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:0 0 80px;
}

/* Dot grid background */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(102,0,255,.12) 1px,transparent 1px);
  background-size:24px 24px;
}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
.hdr{
  background:var(--panel);
  border-bottom:4px solid var(--b1);
  box-shadow:0 4px 0 rgba(102,0,255,.35);
  min-height:130px;display:flex;align-items:center;
  position:relative;overflow:hidden;z-index:1;
}
/* star field */
.hdr::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(rgba(255,255,255,.8) 1px,transparent 1px),
    radial-gradient(rgba(0,255,255,.6) 1px,transparent 1px),
    radial-gradient(rgba(255,0,255,.5) 1px,transparent 1px);
  background-size:55px 45px,100px 80px,140px 95px;
  background-position:12px 10px,44px 26px,72px 9px;
}
.hdr-inner{
  position:relative;z-index:1;width:100%;
  display:flex;align-items:center;justify-content:center;
  padding:0 24px;
}
.hdr-logo{
  height:108px;width:auto;
  transition:transform .1s steps(3),filter .1s;
  cursor:pointer;
  image-rendering:pixelated;
}
.hdr-logo:hover{
  transform:scale(1.07) translateY(-5px);
  filter:drop-shadow(0 0 14px var(--cyan)) drop-shadow(4px 4px 0 var(--b1));
}
.hdr-right{
  position:absolute;right:20px;
  display:flex;gap:4px;
}

/* ═══════════════════════════════
   LANGUAGE BUTTONS
═══════════════════════════════ */
.pill-group{display:inline-flex;gap:4px;}
.pill-btn{
  padding:7px 10px;
  background:#14143A;
  border:3px solid #2A2A55;
  box-shadow:3px 3px 0 #000;
  color:var(--dim);
  font-family:var(--fp);font-size:6px;
  cursor:pointer;text-transform:uppercase;
  transition:all .08s;
}
.pill-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.pill-btn.active{
  background:var(--b1);border-color:var(--b2);
  color:#fff;box-shadow:3px 3px 0 #000;
}

/* ═══════════════════════════════
   PAGE BODY
═══════════════════════════════ */
.synth-body{
  position:relative;z-index:1;
  max-width:960px;margin:0 auto;
  padding:22px 16px 0;
}

.synth-title{
  text-align:center;padding:10px 0 16px;
}
.synth-title span{
  display:block;
  font-size:clamp(10px,2.4vw,17px);
  color:var(--cyan);
  text-shadow:0 0 20px var(--cyan),3px 3px 0 var(--b1);
  letter-spacing:2px;
}
.synth-title small{
  display:block;font-size:6px;
  color:var(--dim);letter-spacing:4px;margin-top:10px;
}

/* ═══════════════════════════════
   PIXEL PANEL SHELL
═══════════════════════════════ */
.synth-panel{
  background:var(--panel);
  border:4px solid var(--b1);
  box-shadow:
    8px 8px 0 #000,
    0 0 0 8px #000,
    0 0 0 10px var(--b1);
  padding:20px;
  position:relative;
  margin-bottom:20px;
}

/* Pixel corner screws */
.screw{
  position:absolute;width:10px;height:10px;
  background:var(--b2);border:2px solid #000;z-index:2;
}
.screw::after{display:none;}
.screw-tl{top:-2px;left:-2px;}
.screw-tr{top:-2px;right:-2px;}
.screw-bl{bottom:-2px;left:-2px;}
.screw-br{bottom:-2px;right:-2px;}

/* Layout rows */
.rack-row{display:grid;gap:12px;margin-bottom:12px;}
.rack-row-teams-board{grid-template-columns:1.2fr 1fr;}
.rack-row-controls{grid-template-columns:1fr 1fr;}

/* ═══════════════════════════════
   MODULE (section box)
═══════════════════════════════ */
.module{
  background:var(--module);
  border:3px solid #2A1166;
  padding:14px;
  position:relative;
}
/* top accent bar */
.module::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--b1);
}

.mod-tag{
  font-size:7px;letter-spacing:2px;text-transform:uppercase;
  color:var(--b2);
  padding-bottom:10px;margin-bottom:12px;
  border-bottom:2px solid #1A0844;
  display:flex;align-items:center;gap:7px;
}
.mod-tag-dot{
  width:6px;height:6px;
  background:var(--cyan);
  box-shadow:0 0 6px var(--cyan);
  flex-shrink:0;
  animation:blink .8s step-end infinite;
}

/* ═══════════════════════════════
   STEP BUTTONS (team count)
═══════════════════════════════ */
.sequencer{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.step-btn{
  flex:1;min-width:44px;height:42px;
  background:#121230;
  border:3px solid #2A2A55;
  box-shadow:3px 3px 0 #000;
  color:var(--dim);
  font-family:var(--fp);font-size:11px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:all .08s;
}
.step-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.step-btn.active{
  background:#003333;border-color:var(--cyan);color:var(--cyan);
  box-shadow:3px 3px 0 #004444;
  text-shadow:0 0 8px var(--cyan);
}

/* ═══════════════════════════════
   LCD TEAM INPUTS
═══════════════════════════════ */
.lcd-strips{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:5px;
}
.lcd-strip{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;
  background:#020902;
  border:2px solid rgba(0,255,65,.18);
  border-left:4px solid var(--tc,var(--green));
}
.lcd-strip input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--green);font-family:var(--fp);font-size:7px;
  width:100%;caret-color:var(--green);min-width:0;
}
.lcd-strip input::placeholder{color:rgba(0,255,65,.22);}

/* ═══════════════════════════════
   PIXEL GRID PICKER
═══════════════════════════════ */
.led-matrix-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:10px;}
.led-matrix{
  display:grid;gap:3px;
  cursor:crosshair;user-select:none;
}
.led-cell{
  width:28px;height:28px;
  background:#090920;
  border:2px solid #1A1144;
  transition:background .05s,border-color .05s;
}
.led-cell.hover{
  background:rgba(0,255,255,.2);
  border-color:var(--cyan);
}
.led-cell.sel{
  background:rgba(0,255,255,.28);
  border-color:var(--cyan);
  box-shadow:inset 0 0 4px rgba(0,255,255,.35);
}
.matrix-readout{margin-top:4px;}
.matrix-main{
  font-size:13px;color:var(--cyan);
  text-shadow:3px 3px 0 var(--b1);
  margin-bottom:6px;
}
.matrix-sub{font-size:7px;color:var(--dim);letter-spacing:1px;}

/* ═══════════════════════════════
   PAD BUTTONS (difficulty / qtype)
═══════════════════════════════ */
.pad-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pad-btn{
  aspect-ratio:1;
  background:#0E0E28;
  border:3px solid #252550;
  box-shadow:4px 4px 0 #000;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;
  color:var(--dim);
  font-family:var(--fp);font-size:6px;letter-spacing:1px;text-transform:uppercase;
  position:relative;padding:8px 4px;
  transition:all .08s;
}
.pad-btn::before{
  content:'';position:absolute;top:5px;right:5px;
  width:5px;height:5px;background:rgba(255,255,255,.1);
}
.pad-btn .pad-icon{font-size:20px;}
.pad-btn:hover{
  border-color:rgba(255,255,255,.3);
  transform:translate(-1px,-1px);
  box-shadow:5px 5px 0 #000;
}
.pad-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #000;}

/* cyan active — difficulty */
.pad-btn.active{
  background:#001A1A;border-color:var(--cyan);color:var(--cyan);
  box-shadow:4px 4px 0 #003333;
  text-shadow:0 0 8px var(--cyan);
}
.pad-btn.active::before{background:var(--cyan);box-shadow:0 0 6px var(--cyan);}

/* magenta active — q-type */
.pad-btn.active-accent{
  background:#1A001A;border-color:var(--pink);color:var(--pink);
  box-shadow:4px 4px 0 #330033;
  text-shadow:0 0 8px var(--pink);
}
.pad-btn.active-accent::before{background:var(--pink);box-shadow:0 0 6px var(--pink);}
.pad-btn.active-accent::after{content:'';position:absolute;inset:0;background:transparent;}

/* ═══════════════════════════════
   FX CHAIN — PIXEL TOGGLES
═══════════════════════════════ */
.fx-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.fx-unit{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:14px 10px 12px;
  background:#0C0C22;border:3px solid #1A1144;
  transition:border-color .1s;
}
.fx-unit.on{border-color:var(--cyan);}

.fx-led{
  width:10px;height:10px;
  background:#0A0A0A;border:2px solid #222;
}
.fx-led.on{
  background:var(--cyan);border-color:var(--cyan);
  box-shadow:0 0 8px var(--cyan),0 0 16px rgba(0,255,255,.35);
}

/* Pixel toggle switch */
.lever-track{
  width:54px;height:28px;
  background:#080818;border:3px solid #1E1E44;
  position:relative;cursor:pointer;
  transition:border-color .1s;
}
.lever-track.on{border-color:var(--cyan);}
.lever-knob{
  position:absolute;
  width:20px;height:20px;top:1px;left:1px;
  background:#252550;border:2px solid #444488;
  transition:left .1s steps(4),background .1s,border-color .1s;
}
.lever-track.on .lever-knob{
  left:27px;
  background:var(--cyan);border-color:var(--cyan);
}

.fx-labels{text-align:center;}
.fx-name{
  font-size:7px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.65);margin-bottom:4px;
}
.fx-desc{font-size:6px;color:var(--dim);letter-spacing:.5px;line-height:1.8;}

/* ═══════════════════════════════
   LCD SCREEN (AI prompt)
═══════════════════════════════ */
.lcd-screen{
  position:relative;
  background:#020C02;
  border:3px solid rgba(0,255,65,.22);
  margin-bottom:14px;overflow:hidden;
}
.lcd-screen::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(
    0deg,rgba(0,0,0,.14) 0px,rgba(0,0,0,.14) 1px,
    transparent 1px,transparent 3px
  );
}
.lcd-ta{
  display:block;width:100%;min-height:80px;
  padding:12px 14px;
  background:transparent;border:none;outline:none;
  color:var(--green);font-family:var(--fp);font-size:9px;line-height:2;
  resize:vertical;caret-color:var(--green);
  position:relative;z-index:1;
}
.lcd-ta::placeholder{color:rgba(0,255,65,.25);}
.lcd-cursor{
  display:inline-block;width:8px;height:10px;
  background:var(--green);margin-left:4px;vertical-align:middle;
  animation:blink .9s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ═══════════════════════════════
   LAUNCH BUTTON
═══════════════════════════════ */
.launch-wrap{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:4px 0;
}
.launch-label{
  font-size:7px;letter-spacing:4px;text-transform:uppercase;
  color:var(--dim);
  animation:blink 1.2s step-end infinite;
}
.btn-launch{
  width:100%;padding:18px 24px;
  background:var(--red);
  border:4px solid #FF6677;
  border-bottom:4px solid #880011;
  box-shadow:6px 6px 0 #000, 0 0 20px rgba(255,34,68,.35);
  color:#fff;
  font-family:var(--fp);font-size:12px;letter-spacing:4px;
  text-transform:uppercase;cursor:pointer;
  transition:all .08s;
}
.btn-launch:hover{
  transform:translate(-2px,-2px);
  box-shadow:8px 8px 0 #000, 0 0 30px rgba(255,34,68,.55);
  text-shadow:0 0 12px #fff;
}
.btn-launch:active{
  transform:translate(5px,5px);
  box-shadow:1px 1px 0 #000;
}
.btn-launch:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:6px 6px 0 #000;}

/* ═══════════════════════════════
   SPLASH
═══════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:99999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
#splash.hide{animation:splashOut .4s steps(6) forwards;}
@keyframes splashOut{0%{opacity:1;}100%{opacity:0;}}
.splash-logo{
  height:130px;width:auto;
  animation:splashFloat 1.8s ease-in-out forwards;
  image-rendering:pixelated;
  filter:drop-shadow(0 0 18px var(--cyan)) drop-shadow(4px 4px 0 var(--b1));
}
@keyframes splashFloat{
  0%  {transform:translateY(0)     scale(1)    rotate(-1deg);}
  20% {transform:translateY(-10px) scale(1.04) rotate(1deg);}
  40% {transform:translateY(4px)   scale(.98)  rotate(-.5deg);}
  60% {transform:translateY(-6px)  scale(1.02) rotate(.8deg);}
  80% {transform:translateY(2px)   scale(1)    rotate(0deg);}
  100%{transform:translateY(0)     scale(1)    rotate(0deg);}
}

/* ═══════════════════════════════
   LOADING
═══════════════════════════════ */
.loading-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(7,7,26,.97);z-index:9999;
  flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
.loading-overlay.active{display:flex;}
.load-logo{height:100px;animation:logoPulse 1s step-end infinite;}
@keyframes logoPulse{
  0%,100%{filter:drop-shadow(0 0 8px var(--cyan));}
  50%{filter:drop-shadow(0 0 20px var(--cyan)) drop-shadow(4px 4px 0 var(--b1));}
}
.load-bar-wrap{
  width:200px;height:6px;background:#111;
  border:2px solid var(--cyan);
}
.load-bar{height:100%;background:var(--cyan);animation:sweep 1s linear infinite;}
@keyframes sweep{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
.load-text{font-size:7px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;}

/* ═══════════════════════════════
   PIXEL FLOOR GRID
═══════════════════════════════ */
.grid-floor{
  position:fixed;bottom:0;left:0;right:0;height:64px;
  pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(102,0,255,.1) 1px,transparent 1px),
    linear-gradient(90deg,rgba(102,0,255,.1) 1px,transparent 1px);
  background-size:20px 20px;
  transform:perspective(200px) rotateX(62deg);transform-origin:bottom;
  opacity:.5;
}

/* ═══════════════════════════════
   RESPONSIVE
═══════════════════════════════ */
@media(max-width:680px){
  .rack-row-teams-board,.rack-row-controls{grid-template-columns:1fr;}
  .fx-row{grid-template-columns:1fr;}
  .hdr-logo{height:80px;}
  .hdr-right{position:absolute;right:12px;}
  .led-cell{width:22px;height:22px;}
}
@media(max-width:400px){
  .led-cell{width:18px;height:18px;}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img class="splash-logo" src="Jamboo-logo-png.png" alt="JamBoo">
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <img class="load-logo" src="Jamboo-logo-png.png" alt="JamBoo">
  <div class="load-bar-wrap"><div class="load-bar"></div></div>
  <p class="load-text" id="load-text">Generating...</p>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <img class="hdr-logo" src="Jamboo-logo-png.png" alt="JamBoo">
    <div class="hdr-right">
      <div class="pill-group" id="lang-group">
        <button class="pill-btn active" onclick="setLang('en')">🇬🇧 EN</button>
        <button class="pill-btn" onclick="setLang('pt')">🇧🇷 PT</button>
        <button class="pill-btn" onclick="setLang('es')">🇪🇸 ES</button>
      </div>
    </div>
  </div>
</header>

<div class="synth-body">

  <div class="synth-title">
    <span id="page-title">CREATE YOUR CHALLENGE!</span>
    <small>★ JAMBOO QUIZ GENERATOR 9000 ★</small>
  </div>

  <!-- ══════ PIXEL PANEL ══════ -->
  <div class="synth-panel">
    <div class="screw screw-tl"></div>
    <div class="screw screw-tr"></div>
    <div class="screw screw-bl"></div>
    <div class="screw screw-br"></div>

    <!-- ROW 1: Players + Board -->
    <div class="rack-row rack-row-teams-board" style="margin-bottom:12px;">

      <!-- PLAYER SELECT -->
      <div class="module">
        <div class="mod-tag"><span class="mod-tag-dot"></span><span data-i18n="teamsTitle">SELECT PLAYERS</span></div>
        <div class="sequencer" id="team-count-row"></div>
        <div class="lcd-strips" id="team-inputs"></div>
      </div>

      <!-- BOARD SIZE -->
      <div class="module">
        <div class="mod-tag"><span class="mod-tag-dot"></span><span data-i18n="gridTitle">BOARD SIZE</span></div>
        <div class="led-matrix-wrap">
          <div class="led-matrix" id="gp-grid"></div>
          <div class="matrix-readout">
            <div class="matrix-main" id="gp-label">4 × 3</div>
            <div class="matrix-sub" id="gp-sublabel">12 questions</div>
          </div>
        </div>
      </div>

    </div>

    <!-- ROW 2: Difficulty + Q-Type -->
    <div class="rack-row rack-row-controls" style="margin-bottom:12px;">

      <!-- DIFFICULTY -->
      <div class="module">
        <div class="mod-tag"><span class="mod-tag-dot"></span><span data-i18n="diffTitle">DIFFICULTY</span></div>
        <div class="pad-grid" id="diff-pads">
          <button class="pad-btn active" data-val="easy" onclick="pickDiff(this)">
            <span class="pad-icon">🟢</span><span data-i18n="easy">EASY</span>
          </button>
          <button class="pad-btn" data-val="medium" onclick="pickDiff(this)">
            <span class="pad-icon">🟡</span><span data-i18n="medium">MED</span>
          </button>
          <button class="pad-btn" data-val="hard" onclick="pickDiff(this)">
            <span class="pad-icon">🔴</span><span data-i18n="hard">HARD</span>
          </button>
          <button class="pad-btn" data-val="mixed" onclick="pickDiff(this)">
            <span class="pad-icon">🎲</span><span data-i18n="mixed">MIX</span>
          </button>
        </div>
      </div>

      <!-- Q-TYPE -->
      <div class="module">
        <div class="mod-tag"><span class="mod-tag-dot"></span><span data-i18n="qtypeTitle">QUESTION TYPE</span></div>
        <div class="pad-grid" id="qtype-pads">
          <button class="pad-btn active-accent" data-val="multiple" onclick="pickQtype('multiple',this)">
            <span class="pad-icon">🅰️</span><span data-i18n="mcLabel">M.CHOICE</span>
          </button>
          <button class="pad-btn" data-val="open" onclick="pickQtype('open',this)">
            <span class="pad-icon">💬</span><span data-i18n="openLabel">OPEN</span>
          </button>
          <button class="pad-btn" data-val="drawing" onclick="pickQtype('drawing',this)">
            <span class="pad-icon">✏️</span><span data-i18n="drawLabel">DRAW</span>
          </button>
          <button class="pad-btn" data-val="mixed" onclick="pickQtype('mixed',this)">
            <span class="pad-icon">🎲</span><span data-i18n="mixedLabel">MIXED</span>
          </button>
        </div>
      </div>

    </div>

    <!-- ROW 3: Game Options (toggles) -->
    <div class="module" style="margin-bottom:12px;">
      <div class="mod-tag"><span class="mod-tag-dot"></span><span data-i18n="modTitle">GAME OPTIONS</span></div>
      <div class="fx-row">

        <div class="fx-unit on" id="fx-timer">
          <div class="fx-led on" id="led-timer"></div>
          <div class="lever-track on" id="tog-timer" onclick="toggleFX('timer')">
            <div class="lever-knob"></div>
          </div>
          <div class="fx-labels">
            <div class="fx-name" data-i18n="timerLabel">TIMER</div>
            <div class="fx-desc" data-i18n="timerDesc">30s per question</div>
          </div>
        </div>

        <div class="fx-unit on" id="fx-bonus">
          <div class="fx-led on" id="led-bonus"></div>
          <div class="lever-track on" id="tog-bonus" onclick="toggleFX('bonus')">
            <div class="lever-knob"></div>
          </div>
          <div class="fx-labels">
            <div class="fx-name" data-i18n="bonusLabel">BONUS</div>
            <div class="fx-desc" data-i18n="bonusDesc">Teams bet points</div>
          </div>
        </div>

        <div class="fx-unit" id="fx-speed">
          <div class="fx-led" id="led-speed"></div>
          <div class="lever-track" id="tog-speed" onclick="toggleFX('speed')">
            <div class="lever-knob"></div>
          </div>
          <div class="fx-labels">
            <div class="fx-name" data-i18n="speedLabel">SPEED</div>
            <div class="fx-desc" data-i18n="speedDesc">15s, first buzzer wins</div>
          </div>
        </div>

      </div>
    </div>

    <!-- ROW 4: AI Prompt -->
    <div class="module" style="margin-bottom:14px;">
      <div class="mod-tag">
        <span class="mod-tag-dot"></span>
        <span data-i18n="promptTitle">ENTER YOUR QUEST</span>
        <span class="lcd-cursor"></span>
      </div>
      <div class="lcd-screen">
        <textarea class="lcd-ta" id="ai-prompt" placeholder="> Describe your quiz... e.g. French Revolution for 9th grade students"></textarea>
      </div>
    </div>

    <!-- LAUNCH -->
    <div class="launch-wrap">
      <div class="launch-label" data-i18n="launchLabel">◄ PRESS START ►</div>
      <button class="btn-launch" id="gen-btn" onclick="startGame()">
        ▶ &nbsp;<span data-i18n="startBtn">START GAME</span>
      </button>
    </div>

  </div><!-- /synth-panel -->
</div><!-- /synth-body -->

<div class="grid-floor"></div>

<script>
/* ══════════ I18N ══════════ */
const T = {
  en:{
    pageTitle:'CREATE YOUR CHALLENGE!',
    teamsTitle:'SELECT PLAYERS', gridTitle:'BOARD SIZE',
    diffTitle:'DIFFICULTY',
    easy:'EASY', medium:'MED', hard:'HARD', mixed:'MIX',
    qtypeTitle:'QUESTION TYPE',
    mcLabel:'M.CHOICE', openLabel:'OPEN', drawLabel:'DRAW', mixedLabel:'MIXED',
    modTitle:'GAME OPTIONS',
    timerLabel:'TIMER', timerDesc:'30s per question',
    bonusLabel:'BONUS', bonusDesc:'Teams bet points',
    speedLabel:'SPEED', speedDesc:'15s, first buzzer wins',
    promptTitle:'ENTER YOUR QUEST',
    launchLabel:'◄ PRESS START ►',
    startBtn:'START GAME',
    promptPH:'> Describe your quiz... e.g. French Revolution for 9th grade students',
    noPrompt:'Please describe your quiz topic!',
    generating:'Generating your game...',
    teamDefaults:['Team 1','Team 2','Team 3','Team 4','Team 5','Team 6','Team 7','Team 8'],
    categories:'CAT', rows:'ROW', questions:'questions',
  },
  pt:{
    pageTitle:'CRIE SEU DESAFIO!',
    teamsTitle:'JOGADORES', gridTitle:'TAMANHO DO JOGO',
    diffTitle:'DIFICULDADE',
    easy:'FÁCIL', medium:'MÉDIO', hard:'DIFÍCIL', mixed:'MISTO',
    qtypeTitle:'TIPO DE QUESTÃO',
    mcLabel:'M.ESCOLHA', openLabel:'ABERTA', drawLabel:'DRAW', mixedLabel:'MISTA',
    modTitle:'OPÇÕES DO JOGO',
    timerLabel:'TIMER', timerDesc:'30s por pergunta',
    bonusLabel:'BÔNUS', bonusDesc:'Times apostam pontos',
    speedLabel:'SPEED', speedDesc:'15s, primeiro a tocar',
    promptTitle:'SUA MISSÃO',
    launchLabel:'◄ PRESSIONE START ►',
    startBtn:'INICIAR JOGO',
    promptPH:'> Descreva seu quiz... ex: Revolução Francesa para o 9º ano',
    noPrompt:'Por favor, descreva o tema do quiz!',
    generating:'Gerando seu jogo...',
    teamDefaults:['Time 1','Time 2','Time 3','Time 4','Time 5','Time 6','Time 7','Time 8'],
    categories:'CAT', rows:'LIN', questions:'perguntas',
  },
  es:{
    pageTitle:'¡CREA TU DESAFÍO!',
    teamsTitle:'JUGADORES', gridTitle:'TAMAÑO DEL TABLERO',
    diffTitle:'DIFICULTAD',
    easy:'FÁCIL', medium:'MEDIO', hard:'DIFÍCIL', mixed:'MIXTO',
    qtypeTitle:'TIPO DE PREGUNTA',
    mcLabel:'M.OPCIÓN', openLabel:'ABIERTA', drawLabel:'DIBUJO', mixedLabel:'MIXTA',
    modTitle:'OPCIONES DEL JUEGO',
    timerLabel:'TIMER', timerDesc:'30s por pregunta',
    bonusLabel:'BONUS', bonusDesc:'Equipos apuestan puntos',
    speedLabel:'SPEED', speedDesc:'15s, primero en pulsar',
    promptTitle:'TU MISIÓN',
    launchLabel:'◄ PRESIONA START ►',
    startBtn:'INICIAR JUEGO',
    promptPH:'> Describe tu quiz... ej: Revolución Francesa para 9° grado',
    noPrompt:'¡Por favor describe el tema de tu quiz!',
    generating:'Generando tu juego...',
    teamDefaults:['Equipo 1','Equipo 2','Equipo 3','Equipo 4','Equipo 5','Equipo 6','Equipo 7','Equipo 8'],
    categories:'CAT', rows:'FIL', questions:'preguntas',
  }
};

const TEAM_COLORS=['#00FFCC','#FF00BB','#BF00FF','#F5C518','#00D1FF','#FB923C','#34D399','#F472B6'];

/* ══════════ STATE ══════════ */
let lang='en', numTeams=4, numRows=3, numCols=4;
let difficulty='easy', qType='multiple';
let teams=[];
const fxState={timer:true,bonus:true,speed:false};

/* ══════════ INIT ══════════ */
function init(){
  teams=T[lang].teamDefaults.map((n,i)=>({name:n,color:TEAM_COLORS[i]}));
  renderTeamButtons();
  initGridPicker();
  applyI18n();
}

/* ══════════ LANG ══════════ */
function setLang(l){
  lang=l;
  ['en','pt','es'].forEach((x,i)=>
    document.querySelectorAll('#lang-group .pill-btn')[i].classList.toggle('active',x===l)
  );
  applyI18n();
}

function applyI18n(){
  const d=T[lang];
  document.getElementById('page-title').textContent=d.pageTitle;
  document.getElementById('ai-prompt').placeholder=d.promptPH;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(d[k]!==undefined) el.textContent=d[k];
  });
  updateGridLabel();
  renderTeamInputs();
}

/* ══════════ TEAMS ══════════ */
function renderTeamButtons(){
  const row=document.getElementById('team-count-row');
  row.innerHTML='';
  [2,3,4,5,6,8].forEach(n=>{
    const b=document.createElement('button');
    b.className='step-btn'+(n===numTeams?' active':'');
    b.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="7" r="4"/><path d="M2 21v-2a7 7 0 0 1 14 0v2"/><circle cx="19" cy="8" r="3"/><path d="M19 14c2.8.3 5 1.9 5 4v1"/></svg>${n}`;
    b.onclick=()=>{numTeams=n;renderTeamButtons();};
    row.appendChild(b);
  });
  renderTeamInputs();
}

function renderTeamInputs(){
  const g=document.getElementById('team-inputs');
  g.innerHTML='';
  const defs=T[lang].teamDefaults;
  for(let i=0;i<numTeams;i++){
    if(!teams[i]) teams[i]={name:defs[i],color:TEAM_COLORS[i]};
    const wrap=document.createElement('div');
    wrap.className='lcd-strip';
    wrap.style.setProperty('--tc',TEAM_COLORS[i]);
    const inp=document.createElement('input');
    inp.type='text';inp.value=teams[i].name;
    inp.placeholder=defs[i];
    inp.oninput=e=>teams[i].name=e.target.value;
    wrap.appendChild(inp);
    g.appendChild(wrap);
  }
}

/* ══════════ GRID PICKER ══════════ */
const GP_COLS=8, GP_ROWS=6;

function initGridPicker(){
  const grid=document.getElementById('gp-grid');
  grid.style.gridTemplateColumns=`repeat(${GP_COLS},1fr)`;
  grid.innerHTML='';
  for(let r=0;r<GP_ROWS;r++){
    for(let c=0;c<GP_COLS;c++){
      const cell=document.createElement('div');
      cell.className='led-cell';
      cell.dataset.c=c;cell.dataset.r=r;
      cell.addEventListener('mouseenter',()=>highlightGrid(c,r,false));
      cell.addEventListener('click',()=>{numCols=c+1;numRows=r+1;highlightGrid(c,r,true);updateGridLabel();});
      grid.appendChild(cell);
    }
  }
  grid.addEventListener('mouseleave',()=>highlightGrid(numCols-1,numRows-1,true));
  highlightGrid(numCols-1,numRows-1,true);
  updateGridLabel();
}

function highlightGrid(maxC,maxR,perm){
  document.querySelectorAll('.led-cell').forEach(cell=>{
    const c=+cell.dataset.c,r=+cell.dataset.r;
    const inside=c<=maxC&&r<=maxR;
    cell.classList.toggle('hover',inside&&!perm);
    cell.classList.toggle('sel',inside&&perm);
  });
  const d=T[lang];
  if(!perm){
    document.getElementById('gp-label').textContent=`${maxC+1} ${d.categories} × ${maxR+1} ${d.rows}`;
    document.getElementById('gp-sublabel').textContent=`${(maxC+1)*(maxR+1)} ${d.questions}`;
  }
}

function updateGridLabel(){
  const d=T[lang];
  document.getElementById('gp-label').textContent=`${numCols} ${d.categories} × ${numRows} ${d.rows}`;
  document.getElementById('gp-sublabel').textContent=`${numCols*numRows} ${d.questions}`;
  highlightGrid(numCols-1,numRows-1,true);
}

/* ══════════ DIFFICULTY ══════════ */
function pickDiff(btn){
  difficulty=btn.dataset.val;
  document.querySelectorAll('#diff-pads .pad-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* ══════════ Q-TYPE ══════════ */
function pickQtype(val,btn){
  qType=val;
  document.querySelectorAll('#qtype-pads .pad-btn').forEach(b=>b.classList.remove('active-accent'));
  btn.classList.add('active-accent');
}

/* ══════════ FX TOGGLES ══════════ */
function toggleFX(name){
  fxState[name]=!fxState[name];
  const on=fxState[name];
  document.getElementById('tog-'+name).classList.toggle('on',on);
  document.getElementById('led-'+name).classList.toggle('on',on);
  document.getElementById('fx-'+name).classList.toggle('on',on);
}

/* ══════════ START ══════════ */
function startGame(){
  const prompt=document.getElementById('ai-prompt').value.trim();
  if(!prompt){alert(T[lang].noPrompt);return;}
  const qLang={en:'English',pt:'Portuguese',es:'Spanish'}[lang];
  const config={
    numTeams,numRows,numCols,difficulty,qType,
    teams:teams.slice(0,numTeams),
    lang,qLang,
    timerOn:fxState.timer,bonusOn:fxState.bonus,speedOn:fxState.speed,
    prompt
  };
  document.getElementById('load-text').textContent=T[lang].generating;
  document.getElementById('loading').classList.add('active');
  document.getElementById('gen-btn').disabled=true;
  localStorage.setItem('jamboo_config',JSON.stringify(config));
  window.location.href='game.html';
}

init();

// Splash: wobble then fade
(function(){
  const splash=document.getElementById('splash');
  setTimeout(function(){
    splash.classList.add('hide');
    splash.addEventListener('animationend',function(){
      splash.style.display='none';
    },{once:true});
  },1900);
})();
</script>
</body>
</html>
