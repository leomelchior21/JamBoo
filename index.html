<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JamBoo — Quiz Generator 9000</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   BASE
═══════════════════════════════ */
:root{
  --bg:#07071A;
  --panel:#0D0D22;
  --module:#0A0A1E;
  --b1:#6600FF;
  --b2:#AA00FF;
  --cyan:#00FFFF;
  --green:#00FF41;
  --pink:#FF00FF;
  --yellow:#FFD700;
  --red:#FF2244;
  --text:#FFFFFF;
  --dim:rgba(255,255,255,.38);
  --fp:'Press Start 2P',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--fp);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:0 0 80px;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(102,0,255,.1) 1px,transparent 1px);
  background-size:24px 24px;
}

/* ═══════════════════════════════
   HEADER
═══════════════════════════════ */
.hdr{
  background:var(--panel);
  border-bottom:4px solid var(--b1);
  box-shadow:0 4px 0 rgba(102,0,255,.3);
  min-height:110px;
  display:flex;align-items:center;
  position:relative;
  overflow:visible;
  z-index:10;
}
.hdr::before{
  content:'';position:absolute;inset:0;pointer-events:none;overflow:hidden;
  background-image:
    radial-gradient(rgba(255,255,255,.75) 1px,transparent 1px),
    radial-gradient(rgba(0,255,255,.55) 1px,transparent 1px),
    radial-gradient(rgba(255,0,255,.45) 1px,transparent 1px);
  background-size:55px 45px,100px 80px,140px 95px;
  background-position:12px 10px,44px 26px,72px 9px;
}
.hdr-inner{
  position:relative;z-index:2;width:100%;
  display:flex;align-items:flex-end;justify-content:center;
  padding:0 24px;
  padding-bottom:8px;
}
.hdr-logo{
  height:210px;width:auto;
  position:relative;
  margin-bottom:-45px; /* pop above and below header */
  z-index:20;
  filter:drop-shadow(0 10px 28px rgba(0,0,0,.9)) drop-shadow(0 0 18px rgba(102,0,255,.4));
  transition:transform .15s,filter .15s;
  cursor:pointer;
  image-rendering:pixelated;
}
.hdr-logo:hover{
  transform:scale(1.05) translateY(-6px);
  filter:drop-shadow(0 14px 32px rgba(0,0,0,.9)) drop-shadow(0 0 28px var(--cyan));
}
.hdr-right{
  position:absolute;right:20px;bottom:14px;
  display:flex;gap:4px;z-index:3;
}
.pill-group{display:inline-flex;gap:4px;}
.pill-btn{
  padding:7px 10px;
  background:#14143A;border:3px solid #2A2A55;
  box-shadow:3px 3px 0 #000;
  color:var(--dim);font-family:var(--fp);font-size:6px;
  cursor:pointer;text-transform:uppercase;transition:all .08s;
}
.pill-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.pill-btn.active{background:var(--b1);border-color:var(--b2);color:#fff;box-shadow:3px 3px 0 #000;}

/* ═══════════════════════════════
   PAGE BODY
═══════════════════════════════ */
.synth-body{
  position:relative;z-index:1;
  max-width:980px;margin:0 auto;
  padding:60px 16px 0; /* extra top padding for logo overhang */
}
.synth-title{text-align:center;padding:10px 0 20px;}
.synth-title span{
  display:block;font-size:clamp(9px,2vw,14px);
  color:var(--cyan);text-shadow:0 0 18px var(--cyan),3px 3px 0 var(--b1);
  letter-spacing:2px;
}
.synth-title small{
  display:block;font-size:6px;
  color:var(--dim);letter-spacing:4px;margin-top:10px;
}

/* ═══════════════════════════════
   PIXEL PANEL SHELL
═══════════════════════════════ */
.synth-panel{
  background:var(--panel);
  border:4px solid var(--b1);
  box-shadow:8px 8px 0 #000,0 0 0 8px #000,0 0 0 10px var(--b1);
  padding:20px;position:relative;margin-bottom:20px;
}
.screw{position:absolute;width:10px;height:10px;background:var(--b2);border:2px solid #000;z-index:2;}
.screw::after{display:none;}
.screw-tl{top:-2px;left:-2px;}
.screw-tr{top:-2px;right:-2px;}
.screw-bl{bottom:-2px;left:-2px;}
.screw-br{bottom:-2px;right:-2px;}

/* ═══════════════════════════════
   MIXER / FADER BANK
═══════════════════════════════ */
.fader-bank{
  display:flex;align-items:stretch;gap:0;
  background:var(--module);
  border:3px solid #2A1166;
  margin-bottom:14px;
  overflow-x:auto;
  scrollbar-width:thin;
  scrollbar-color:#2A1166 #080818;
}
.fader-bank::-webkit-scrollbar{height:4px;}
.fader-bank::-webkit-scrollbar-track{background:#080818;}
.fader-bank::-webkit-scrollbar-thumb{background:#2A1166;}

/* vertical pixel divider between sections */
.fader-divider{
  width:3px;background:#2A1166;
  flex-shrink:0;
  position:relative;
}
.fader-divider::before,.fader-divider::after{
  content:'';position:absolute;left:0;right:0;height:3px;background:#441188;
}
.fader-divider::before{top:24px;}
.fader-divider::after{bottom:24px;}

/* each labelled section */
.fader-section{
  display:flex;flex-direction:column;align-items:center;
  padding:14px 12px 12px;gap:10px;
  flex-shrink:0;
}
.section-lbl{
  font-size:6px;letter-spacing:2px;text-transform:uppercase;
  color:var(--b2);padding-bottom:8px;
  border-bottom:2px solid #2A1166;
  text-align:center;width:100%;
}
.fader-group{display:flex;gap:10px;align-items:flex-end;}

/* single fader column */
.fader-col{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  min-width:46px;
}
.fader-val{
  font-size:7px;color:var(--cyan);
  text-shadow:0 0 8px var(--cyan);
  background:#03080F;
  border:2px solid rgba(0,255,255,.22);
  padding:3px 4px;text-align:center;
  min-width:44px;white-space:nowrap;
  letter-spacing:1px;
}
/* slider wrapper — fixed size so rotate works */
.fader-slider-wrap{
  width:36px;height:160px;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
/* visual rail behind slider */
.fader-rail{
  position:absolute;width:8px;height:148px;
  background:#050518;border:2px solid #2A1166;
  left:50%;transform:translateX(-50%);pointer-events:none;
}
.fader-rail::before,.fader-rail::after{
  content:'';position:absolute;right:-7px;width:5px;height:2px;
  background:rgba(255,255,255,.16);
}
.fader-rail::before{top:22%;}
.fader-rail::after{top:66%;}

/* THE ACTUAL SLIDER — rotated horizontal → vertical */
input[type=range].fader{
  -webkit-appearance:none;appearance:none;
  width:152px;height:36px;
  transform:rotate(-90deg);
  background:transparent;outline:none;
  cursor:grab;position:relative;z-index:1;
  margin:0;padding:0;
}
input[type=range].fader:active{cursor:grabbing;}

/* Chrome / Safari */
input[type=range].fader::-webkit-slider-runnable-track{
  height:8px;
  background:#080820;border:2px solid #2A1166;
}
input[type=range].fader::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:30px;height:20px;
  background:linear-gradient(0deg,#222248,#32325A);
  border:3px solid #7777BB;
  box-shadow:2px 0 0 #000;
  margin-top:-8px;
  cursor:grab;
  transition:border-color .1s,background .1s;
}
input[type=range].fader:hover::-webkit-slider-thumb{border-color:var(--cyan);background:linear-gradient(0deg,#282860,#383870);}
input[type=range].fader:active::-webkit-slider-thumb{cursor:grabbing;}

/* Firefox */
input[type=range].fader::-moz-range-track{
  height:8px;background:#080820;border:2px solid #2A1166;
}
input[type=range].fader::-moz-range-thumb{
  width:26px;height:16px;
  background:#222248;border:3px solid #7777BB;
  border-radius:0;cursor:grab;
}

.fader-label{
  font-size:6px;color:var(--dim);
  letter-spacing:2px;text-transform:uppercase;text-align:center;
}

/* ═══════════════════════════════
   FX TOGGLES (in fader bank)
═══════════════════════════════ */
.toggle-group{display:flex;gap:10px;}
.toggle-col{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  cursor:pointer;min-width:46px;
  padding:6px 4px;
  border:2px solid #1A1144;
  transition:border-color .1s;
}
.toggle-col.on{border-color:var(--cyan);}
.toggle-col:hover{border-color:rgba(255,255,255,.2);}

.fx-led{width:10px;height:10px;background:#0A0A0A;border:2px solid #222;}
.fx-led.on{
  background:var(--cyan);border-color:var(--cyan);
  box-shadow:0 0 8px var(--cyan),0 0 16px rgba(0,255,255,.35);
}
/* pixel toggle switch */
.lever-track{
  width:46px;height:24px;
  background:#080818;border:3px solid #1E1E44;
  position:relative;cursor:pointer;transition:border-color .1s;
}
.lever-track.on{border-color:var(--cyan);}
.lever-knob{
  position:absolute;width:16px;height:16px;top:1px;left:1px;
  background:#252550;border:2px solid #444488;
  transition:left .1s steps(4),background .1s,border-color .1s;
}
.lever-track.on .lever-knob{left:24px;background:var(--cyan);border-color:var(--cyan);}
.fx-desc{font-size:6px;color:var(--dim);letter-spacing:.5px;line-height:1.8;text-align:center;}

/* ═══════════════════════════════
   TEAM NAME INPUTS
═══════════════════════════════ */
.team-row-wrap{margin-bottom:14px;}
.team-row-label{
  font-size:7px;letter-spacing:2px;text-transform:uppercase;
  color:var(--b2);padding-bottom:8px;margin-bottom:10px;
  border-bottom:2px solid #1A0844;
  display:flex;align-items:center;gap:7px;
}
.team-row-dot{
  width:6px;height:6px;background:var(--cyan);
  box-shadow:0 0 6px var(--cyan);flex-shrink:0;
  animation:blink .8s step-end infinite;
}
.lcd-strips{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(115px,1fr));
  gap:5px;
}
.lcd-strip{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;
  background:#020902;
  border:2px solid rgba(0,255,65,.18);
  border-left:4px solid var(--tc,var(--green));
}
.lcd-strip input{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--green);font-family:var(--fp);font-size:8px;
  width:100%;caret-color:var(--green);min-width:0;
}
.lcd-strip input::placeholder{color:rgba(0,255,65,.22);}

/* ═══════════════════════════════
   LCD AI PROMPT
═══════════════════════════════ */
.prompt-wrap{margin-bottom:14px;}
.prompt-label{
  font-size:7px;letter-spacing:2px;text-transform:uppercase;
  color:var(--b2);padding-bottom:8px;margin-bottom:10px;
  border-bottom:2px solid #1A0844;
  display:flex;align-items:center;gap:7px;
}
.lcd-cursor{
  display:inline-block;width:8px;height:10px;
  background:var(--green);margin-left:4px;vertical-align:middle;
  animation:blink .9s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.lcd-screen{
  position:relative;background:#020C02;
  border:3px solid rgba(0,255,65,.22);overflow:hidden;
}
.lcd-screen::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(
    0deg,rgba(0,0,0,.14) 0px,rgba(0,0,0,.14) 1px,
    transparent 1px,transparent 3px
  );
}
.lcd-ta{
  display:block;width:100%;min-height:80px;
  padding:12px 14px;
  background:transparent;border:none;outline:none;
  color:var(--green);font-family:var(--fp);font-size:9px;line-height:2;
  resize:vertical;caret-color:var(--green);position:relative;z-index:1;
}
.lcd-ta::placeholder{color:rgba(0,255,65,.25);}

/* ═══════════════════════════════
   LAUNCH BUTTON
═══════════════════════════════ */
.launch-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:4px 0;}
.launch-label{
  font-size:7px;letter-spacing:4px;text-transform:uppercase;
  color:var(--dim);animation:blink 1.2s step-end infinite;
}
.btn-launch{
  width:100%;padding:18px 24px;
  background:var(--red);
  border:4px solid #FF6677;border-bottom:4px solid #880011;
  box-shadow:6px 6px 0 #000,0 0 20px rgba(255,34,68,.35);
  color:#fff;font-family:var(--fp);font-size:12px;letter-spacing:4px;
  text-transform:uppercase;cursor:pointer;transition:all .08s;
}
.btn-launch:hover{
  transform:translate(-2px,-2px);
  box-shadow:8px 8px 0 #000,0 0 30px rgba(255,34,68,.55);
  text-shadow:0 0 12px #fff;
}
.btn-launch:active{transform:translate(5px,5px);box-shadow:1px 1px 0 #000;}
.btn-launch:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:6px 6px 0 #000;}

/* ═══════════════════════════════
   SPLASH
═══════════════════════════════ */
#splash{
  position:fixed;inset:0;z-index:99999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
#splash.hide{animation:splashOut .4s steps(6) forwards;}
@keyframes splashOut{0%{opacity:1;}100%{opacity:0;}}
.splash-logo{
  height:160px;width:auto;
  animation:splashFloat 1.8s ease-in-out forwards;
  image-rendering:pixelated;
  filter:drop-shadow(0 0 18px var(--cyan)) drop-shadow(4px 4px 0 var(--b1));
}
@keyframes splashFloat{
  0%  {transform:translateY(0)     scale(1)    rotate(-1deg);}
  20% {transform:translateY(-10px) scale(1.04) rotate(1deg);}
  40% {transform:translateY(4px)   scale(.98)  rotate(-.5deg);}
  60% {transform:translateY(-6px)  scale(1.02) rotate(.8deg);}
  80% {transform:translateY(2px)   scale(1)    rotate(0deg);}
  100%{transform:translateY(0)     scale(1)    rotate(0deg);}
}

/* ═══════════════════════════════
   LOADING OVERLAY (AI generation)
═══════════════════════════════ */
.loading-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(7,7,26,.97);z-index:9999;
  flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
.loading-overlay.active{display:flex;}
.load-logo{height:100px;animation:logoPulse 1s step-end infinite;}
@keyframes logoPulse{
  0%,100%{filter:drop-shadow(0 0 8px var(--cyan));}
  50%{filter:drop-shadow(0 0 20px var(--cyan)) drop-shadow(4px 4px 0 var(--b1));}
}
.load-bar-wrap{width:200px;height:6px;background:#111;border:2px solid var(--cyan);}
.load-bar{height:100%;background:var(--cyan);animation:sweep 1s linear infinite;}
@keyframes sweep{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
.load-text{font-size:7px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;}

/* ═══════════════════════════════
   FLOOR GRID
═══════════════════════════════ */
.grid-floor{
  position:fixed;bottom:0;left:0;right:0;height:64px;
  pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(102,0,255,.1) 1px,transparent 1px),
    linear-gradient(90deg,rgba(102,0,255,.1) 1px,transparent 1px);
  background-size:20px 20px;
  transform:perspective(200px) rotateX(62deg);transform-origin:bottom;opacity:.5;
}

/* ═══════════════════════════════
   RESPONSIVE
═══════════════════════════════ */
@media(max-width:680px){
  .hdr-logo{height:150px;margin-bottom:-30px;}
  .synth-body{padding-top:44px;}
  .hdr-right{right:10px;bottom:10px;}
}
@media(max-width:400px){
  .hdr-logo{height:120px;margin-bottom:-22px;}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img class="splash-logo" src="Jamboo-logo-png.png" alt="JamBoo">
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <img class="load-logo" src="Jamboo-logo-png.png" alt="JamBoo">
  <div class="load-bar-wrap"><div class="load-bar"></div></div>
  <p class="load-text" id="load-text">Generating...</p>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <img class="hdr-logo" src="Jamboo-logo-png.png" alt="JamBoo" onclick="window.scrollTo(0,0)">
    <div class="hdr-right">
      <div class="pill-group" id="lang-group">
        <button class="pill-btn active" onclick="setLang('en')">🇬🇧 EN</button>
        <button class="pill-btn" onclick="setLang('pt')">🇧🇷 PT</button>
        <button class="pill-btn" onclick="setLang('es')">🇪🇸 ES</button>
      </div>
    </div>
  </div>
</header>

<div class="synth-body">

  <div class="synth-title">
    <span id="page-title">CREATE YOUR CHALLENGE!</span>
    <small>★ JAMBOO QUIZ GENERATOR 9000 ★</small>
  </div>

  <div class="synth-panel">
    <div class="screw screw-tl"></div>
    <div class="screw screw-tr"></div>
    <div class="screw screw-bl"></div>
    <div class="screw screw-br"></div>

    <!-- ══ MIXER / FADER BANK ══ -->
    <div class="fader-bank" id="fader-bank">

      <!-- SECTION 1: PLAYERS -->
      <div class="fader-section">
        <div class="section-lbl" data-i18n="teamsTitle">PLAYERS</div>
        <div class="fader-group">
          <div class="fader-col">
            <div class="fader-val" id="teams-val">4</div>
            <div class="fader-slider-wrap">
              <div class="fader-rail"></div>
              <input type="range" class="fader" id="teams-fader" min="0" max="5" step="1" value="2" oninput="onTeamsFader(this)">
            </div>
            <div class="fader-label" data-i18n="teamsLabel">TEAMS</div>
          </div>
        </div>
      </div>

      <div class="fader-divider"></div>

      <!-- SECTION 2: BOARD SIZE -->
      <div class="fader-section">
        <div class="section-lbl" data-i18n="gridTitle">BOARD SIZE</div>
        <div class="fader-group">
          <div class="fader-col">
            <div class="fader-val" id="cols-val">4</div>
            <div class="fader-slider-wrap">
              <div class="fader-rail"></div>
              <input type="range" class="fader" id="cols-fader" min="1" max="8" step="1" value="4" oninput="onColsFader(this)">
            </div>
            <div class="fader-label" data-i18n="colsLabel">CATEG</div>
          </div>
          <div class="fader-col">
            <div class="fader-val" id="rows-val">3</div>
            <div class="fader-slider-wrap">
              <div class="fader-rail"></div>
              <input type="range" class="fader" id="rows-fader" min="1" max="6" step="1" value="3" oninput="onRowsFader(this)">
            </div>
            <div class="fader-label" data-i18n="rowsLabel">ROWS</div>
          </div>
        </div>
        <div class="fader-val" id="board-summary" style="font-size:6px;background:transparent;border:none;color:var(--dim);letter-spacing:1px;">12 questions</div>
      </div>

      <div class="fader-divider"></div>

      <!-- SECTION 3: DIFFICULTY -->
      <div class="fader-section">
        <div class="section-lbl" data-i18n="diffTitle">DIFFICULTY</div>
        <div class="fader-group">
          <div class="fader-col">
            <div class="fader-val" id="diff-val">EASY</div>
            <div class="fader-slider-wrap">
              <div class="fader-rail"></div>
              <input type="range" class="fader" id="diff-fader" min="0" max="3" step="1" value="0" oninput="onDiffFader(this)">
            </div>
            <div class="fader-label" data-i18n="diffLabel">LEVEL</div>
          </div>
        </div>
      </div>

      <div class="fader-divider"></div>

      <!-- SECTION 4: QUEST TYPE -->
      <div class="fader-section">
        <div class="section-lbl" data-i18n="qtypeTitle">QUESTION</div>
        <div class="fader-group">
          <div class="fader-col">
            <div class="fader-val" id="qtype-val">M.C.</div>
            <div class="fader-slider-wrap">
              <div class="fader-rail"></div>
              <input type="range" class="fader" id="qtype-fader" min="0" max="3" step="1" value="0" oninput="onQtypeFader(this)">
            </div>
            <div class="fader-label" data-i18n="qtypeLabel">TYPE</div>
          </div>
        </div>
      </div>

      <div class="fader-divider"></div>

      <!-- SECTION 5: FX OPTIONS (toggles) -->
      <div class="fader-section">
        <div class="section-lbl" data-i18n="modTitle">OPTIONS</div>
        <div class="toggle-group">

          <div class="toggle-col on" id="fx-timer" onclick="toggleFX('timer')">
            <div class="fx-led on" id="led-timer"></div>
            <div class="lever-track on" id="tog-timer"><div class="lever-knob"></div></div>
            <div class="fader-label" data-i18n="timerLabel">TIMER</div>
            <div class="fx-desc" data-i18n="timerDesc">30s</div>
          </div>

          <div class="toggle-col on" id="fx-bonus" onclick="toggleFX('bonus')">
            <div class="fx-led on" id="led-bonus"></div>
            <div class="lever-track on" id="tog-bonus"><div class="lever-knob"></div></div>
            <div class="fader-label" data-i18n="bonusLabel">BONUS</div>
            <div class="fx-desc" data-i18n="bonusDesc">BET</div>
          </div>

          <div class="toggle-col" id="fx-speed" onclick="toggleFX('speed')">
            <div class="fx-led" id="led-speed"></div>
            <div class="lever-track" id="tog-speed"><div class="lever-knob"></div></div>
            <div class="fader-label" data-i18n="speedLabel">SPEED</div>
            <div class="fx-desc" data-i18n="speedDesc">15s</div>
          </div>

        </div>
      </div>

    </div><!-- /fader-bank -->

    <!-- TEAM NAMES -->
    <div class="team-row-wrap">
      <div class="team-row-label">
        <span class="team-row-dot"></span>
        <span data-i18n="teamNamesLabel">TEAM NAMES</span>
      </div>
      <div class="lcd-strips" id="team-inputs"></div>
    </div>

    <!-- AI PROMPT -->
    <div class="prompt-wrap">
      <div class="prompt-label">
        <span class="team-row-dot"></span>
        <span data-i18n="promptTitle">ENTER YOUR QUEST</span>
        <span class="lcd-cursor"></span>
      </div>
      <div class="lcd-screen">
        <textarea class="lcd-ta" id="ai-prompt" placeholder="> Describe your quiz..."></textarea>
      </div>
    </div>

    <!-- LAUNCH -->
    <div class="launch-wrap">
      <div class="launch-label" data-i18n="launchLabel">◄ PRESS START ►</div>
      <button class="btn-launch" id="gen-btn" onclick="startGame()">
        ▶ &nbsp;<span data-i18n="startBtn">START GAME</span>
      </button>
    </div>

  </div><!-- /synth-panel -->
</div><!-- /synth-body -->

<div class="grid-floor"></div>

<script>
/* ══════════ I18N ══════════ */
const T={
  en:{
    pageTitle:'CREATE YOUR CHALLENGE!',
    teamsTitle:'PLAYERS', teamsLabel:'TEAMS',
    gridTitle:'BOARD SIZE', colsLabel:'CATEG', rowsLabel:'ROWS',
    diffTitle:'DIFFICULTY', diffLabel:'LEVEL',
    diff0:'EASY',diff1:'MED',diff2:'HARD',diff3:'MIX',
    qtypeTitle:'QUESTION', qtypeLabel:'TYPE',
    qt0:'M.C.',qt1:'OPEN',qt2:'DRAW',qt3:'MIX',
    modTitle:'OPTIONS',
    timerLabel:'TIMER', timerDesc:'30s',
    bonusLabel:'BONUS', bonusDesc:'BET',
    speedLabel:'SPEED', speedDesc:'15s',
    teamNamesLabel:'TEAM NAMES',
    promptTitle:'ENTER YOUR QUEST',
    launchLabel:'◄ PRESS START ►',
    startBtn:'START GAME',
    promptPH:'> Describe your quiz... e.g. French Revolution for 9th grade students',
    noPrompt:'Please describe your quiz topic!',
    generating:'Generating your game...',
    teamDefaults:['Team 1','Team 2','Team 3','Team 4','Team 5','Team 6','Team 7','Team 8'],
    questions:'questions',
  },
  pt:{
    pageTitle:'CRIE SEU DESAFIO!',
    teamsTitle:'JOGADORES', teamsLabel:'TIMES',
    gridTitle:'TAMANHO', colsLabel:'CATEG', rowsLabel:'LINHAS',
    diffTitle:'DIFICULDADE', diffLabel:'NÍVEL',
    diff0:'FÁCIL',diff1:'MÉDIO',diff2:'DIFÍCIL',diff3:'MISTO',
    qtypeTitle:'QUESTÃO', qtypeLabel:'TIPO',
    qt0:'M.E.',qt1:'ABERTA',qt2:'DRAW',qt3:'MIX',
    modTitle:'OPÇÕES',
    timerLabel:'TIMER', timerDesc:'30s',
    bonusLabel:'BÔNUS', bonusDesc:'APOSTAR',
    speedLabel:'SPEED', speedDesc:'15s',
    teamNamesLabel:'NOMES DOS TIMES',
    promptTitle:'SUA MISSÃO',
    launchLabel:'◄ PRESSIONE START ►',
    startBtn:'INICIAR JOGO',
    promptPH:'> Descreva seu quiz... ex: Revolução Francesa para o 9º ano',
    noPrompt:'Por favor, descreva o tema do quiz!',
    generating:'Gerando seu jogo...',
    teamDefaults:['Time 1','Time 2','Time 3','Time 4','Time 5','Time 6','Time 7','Time 8'],
    questions:'perguntas',
  },
  es:{
    pageTitle:'¡CREA TU DESAFÍO!',
    teamsTitle:'JUGADORES', teamsLabel:'EQUIPOS',
    gridTitle:'TAMAÑO', colsLabel:'CATEG', rowsLabel:'FILAS',
    diffTitle:'DIFICULTAD', diffLabel:'NIVEL',
    diff0:'FÁCIL',diff1:'MEDIO',diff2:'DIFÍCIL',diff3:'MIXTO',
    qtypeTitle:'PREGUNTA', qtypeLabel:'TIPO',
    qt0:'M.O.',qt1:'ABIERTA',qt2:'DIBUJO',qt3:'MIX',
    modTitle:'OPCIONES',
    timerLabel:'TIMER', timerDesc:'30s',
    bonusLabel:'BONUS', bonusDesc:'APOSTAR',
    speedLabel:'SPEED', speedDesc:'15s',
    teamNamesLabel:'NOMBRES DE EQUIPOS',
    promptTitle:'TU MISIÓN',
    launchLabel:'◄ PRESIONA START ►',
    startBtn:'INICIAR JUEGO',
    promptPH:'> Describe tu quiz... ej: Revolución Francesa para 9° grado',
    noPrompt:'¡Por favor describe el tema de tu quiz!',
    generating:'Generando tu juego...',
    teamDefaults:['Equipo 1','Equipo 2','Equipo 3','Equipo 4','Equipo 5','Equipo 6','Equipo 7','Equipo 8'],
    questions:'preguntas',
  }
};

const TEAMS_MAP=[2,3,4,5,6,8];
const DIFF_MAP=['easy','medium','hard','mixed'];
const QTYPE_MAP=['multiple','open','drawing','mixed'];
const TEAM_COLORS=['#00FFCC','#FF00BB','#BF00FF','#F5C518','#00D1FF','#FB923C','#34D399','#F472B6'];

/* ══════════ STATE ══════════ */
let lang='en';
let numTeams=4, numCols=4, numRows=3;
let difficulty='easy', qType='multiple';
let teams=[];
const fxState={timer:true,bonus:true,speed:false};

/* ══════════ INIT ══════════ */
function init(){
  teams=T[lang].teamDefaults.map((n,i)=>({name:n,color:TEAM_COLORS[i]}));
  renderTeamInputs();
  applyI18n();
  updateBoardSummary();
}

/* ══════════ LANG ══════════ */
function setLang(l){
  lang=l;
  ['en','pt','es'].forEach((x,i)=>
    document.querySelectorAll('#lang-group .pill-btn')[i].classList.toggle('active',x===l)
  );
  applyI18n();
}

function applyI18n(){
  const d=T[lang];
  document.getElementById('page-title').textContent=d.pageTitle;
  document.getElementById('ai-prompt').placeholder=d.promptPH;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(d[k]!==undefined) el.textContent=d[k];
  });
  // re-apply dynamic readouts after lang switch
  const ti=document.getElementById('teams-fader');
  if(ti) onTeamsFader(ti,true);
  const di=document.getElementById('diff-fader');
  if(di) onDiffFader(di,true);
  const qi=document.getElementById('qtype-fader');
  if(qi) onQtypeFader(qi,true);
  updateBoardSummary();
  renderTeamInputs();
}

/* ══════════ FADER HANDLERS ══════════ */
function onTeamsFader(el, silent){
  numTeams=TEAMS_MAP[+el.value];
  document.getElementById('teams-val').textContent=numTeams;
  if(!silent) renderTeamInputs();
}
function onColsFader(el){
  numCols=+el.value;
  document.getElementById('cols-val').textContent=numCols;
  updateBoardSummary();
}
function onRowsFader(el){
  numRows=+el.value;
  document.getElementById('rows-val').textContent=numRows;
  updateBoardSummary();
}
function onDiffFader(el, silent){
  const idx=+el.value;
  difficulty=DIFF_MAP[idx];
  document.getElementById('diff-val').textContent=T[lang]['diff'+idx];
}
function onQtypeFader(el, silent){
  const idx=+el.value;
  qType=QTYPE_MAP[idx];
  document.getElementById('qtype-val').textContent=T[lang]['qt'+idx];
}
function updateBoardSummary(){
  const el=document.getElementById('board-summary');
  if(el) el.textContent=`${numCols*numRows} ${T[lang].questions}`;
}

/* ══════════ TEAM INPUTS ══════════ */
function renderTeamInputs(){
  const g=document.getElementById('team-inputs');
  g.innerHTML='';
  const defs=T[lang].teamDefaults;
  for(let i=0;i<numTeams;i++){
    if(!teams[i]) teams[i]={name:defs[i],color:TEAM_COLORS[i]};
    const wrap=document.createElement('div');
    wrap.className='lcd-strip';
    wrap.style.setProperty('--tc',TEAM_COLORS[i]);
    const inp=document.createElement('input');
    inp.type='text';inp.value=teams[i].name;inp.placeholder=defs[i];
    inp.oninput=e=>teams[i].name=e.target.value;
    wrap.appendChild(inp);
    g.appendChild(wrap);
  }
}

/* ══════════ FX TOGGLES ══════════ */
function toggleFX(name){
  fxState[name]=!fxState[name];
  const on=fxState[name];
  document.getElementById('tog-'+name).classList.toggle('on',on);
  document.getElementById('led-'+name).classList.toggle('on',on);
  document.getElementById('fx-'+name).classList.toggle('on',on);
}

/* ══════════ START ══════════ */
function startGame(){
  const prompt=document.getElementById('ai-prompt').value.trim();
  if(!prompt){alert(T[lang].noPrompt);return;}
  const qLang={en:'English',pt:'Portuguese',es:'Spanish'}[lang];
  const config={
    numTeams,numRows,numCols,difficulty,qType,
    teams:teams.slice(0,numTeams),
    lang,qLang,
    timerOn:fxState.timer,bonusOn:fxState.bonus,speedOn:fxState.speed,
    prompt
  };
  document.getElementById('load-text').textContent=T[lang].generating;
  document.getElementById('loading').classList.add('active');
  document.getElementById('gen-btn').disabled=true;
  localStorage.setItem('jamboo_config',JSON.stringify(config));
  window.location.href='game.html';
}

init();

// Splash
(function(){
  const splash=document.getElementById('splash');
  setTimeout(function(){
    splash.classList.add('hide');
    splash.addEventListener('animationend',function(){splash.style.display='none';},{once:true});
  },1900);
})();
</script>
</body>
</html>
