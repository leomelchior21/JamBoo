<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JamBoo — Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   RETRO / SYNTHWAVE THEME
═══════════════════════════════════════════ */
:root {
  --bz:       1;
  --bg:       #0A0A1F;
  --panel:    #12122A;
  --panel2:   #0D0D22;
  --border:   #BF00FF;
  --primary:  #00FFCC;
  --accent:   #FF00BB;
  --danger:   #FF4444;
  --text:     #FFFFFF;
  --text2:    rgba(255,255,255,.45);
  --gray:     rgba(255,255,255,.05);
  --shadow:   0 0 24px rgba(0,255,204,.18);
  --radius:   4px;
  --fh:       'Fredoka One', cursive;
  --fp:       'Press Start 2P', monospace;
  --fb:       'Nunito', sans-serif;
  --cat-bg:   #0D0D22;
  --cat-color:#00FFCC;
  --cell-bg:  #12122A;
  --cell-hover:#1A1A3A;
  --cell-used:#080818;
  --cell-used-text:rgba(255,255,255,.15);
}

/* ═══════════════════════════════════════════
   RESET + BASE
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--fb);background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════════════
   LOADING
═══════════════════════════════════════════ */
#loading{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#loading.hidden{display:none;}

/* logo: blasts in from scale(15) → settles, then gentle wobble */
.load-logo{
  height:216px;
  image-rendering:pixelated;
  filter:drop-shadow(0 0 24px #BF00FF) drop-shadow(0 0 8px #FF00BB);
  animation:
    logoZoomIn 2.4s cubic-bezier(0.12, 0.9, 0.2, 1.04) forwards,
    logoWobble 3.2s ease-in-out 2.4s infinite;
}
@keyframes logoZoomIn{
  0%  { transform:scale(15);   opacity:0;   filter:blur(20px); }
  65% { transform:scale(0.92); opacity:1;   filter:blur(0);    }
  80% { transform:scale(1.06); opacity:1;   filter:blur(0);    }
  100%{ transform:scale(1);    opacity:1;   filter:blur(0);    }
}
@keyframes logoWobble{
  0%  { transform:rotate(0deg)    translateY(0);    }
  20% { transform:rotate(-1.5deg) translateY(-5px); }
  40% { transform:rotate(.8deg)   translateY(-2px); }
  60% { transform:rotate(-1.2deg) translateY(-6px); }
  80% { transform:rotate(.5deg)   translateY(-1px); }
  100%{ transform:rotate(0deg)    translateY(0);    }
}

/* ── RUBE GOLDBERG MACHINE ── */
.rgb-machine{
  position:relative;width:360px;height:80px;
  margin:4px auto;flex-shrink:0;
}
/* platforms */
.rgb-plat{
  position:absolute;height:4px;
  background:var(--primary);
  box-shadow:0 0 5px var(--primary);
  image-rendering:pixelated;
}
.plat-a{width:70px; left:10px;  bottom:44px; transform:rotate(-6deg);}
.plat-b{width:55px; left:118px; bottom:28px;}
.plat-c{width:70px; left:215px; bottom:44px; transform:rotate(6deg);}
.plat-d{width:50px; left:298px; bottom:28px;}

/* ball */
.rgb-ball{
  position:absolute;
  width:11px;height:11px;
  background:#FFD700;border:2px solid #000;
  box-shadow:0 0 7px #FFD700;
  animation:ballPath 2.8s steps(28) infinite;
}
@keyframes ballPath{
  0%  {left:10px; bottom:52px;}
  22% {left:80px; bottom:40px;}
  28% {left:100px;bottom:26px;}
  48% {left:118px;bottom:36px;}
  55% {left:173px;bottom:24px;}
  72% {left:215px;bottom:52px;}
  80% {left:285px;bottom:50px;}
  86% {left:298px;bottom:36px;}
  94% {left:348px;bottom:30px;}
  100%{left:360px;bottom:28px;opacity:0;}
}

/* gear at right */
.rgb-gear{
  position:absolute;right:4px;bottom:6px;
  font-size:26px;line-height:1;
  color:var(--accent);
  filter:drop-shadow(0 0 5px var(--accent));
  animation:gearSpin 1.2s steps(8) infinite;
}
@keyframes gearSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* lever */
.rgb-lever{
  position:absolute;left:155px;bottom:16px;
  width:36px;height:4px;background:#BF00FF;
  transform-origin:center center;
  box-shadow:0 0 5px #BF00FF;
  animation:leverTip 2.8s steps(4) infinite;
}
@keyframes leverTip{
  0%,40%{transform:rotate(-12deg);}
  48%,100%{transform:rotate(12deg);}
}

/* pixel stars / sparks */
.rgb-spark{
  position:absolute;font-size:10px;
  animation:sparkBlink 1.4s steps(2) infinite;
}
@keyframes sparkBlink{0%,100%{opacity:1;}50%{opacity:0;}}
.spark-1{left:105px;bottom:40px;color:var(--primary);animation-delay:.3s;}
.spark-2{left:206px;bottom:56px;color:#FFD700;animation-delay:.9s;}
.spark-3{left:292px;bottom:44px;color:var(--accent);animation-delay:.1s;}

.load-bar-wrap{
  width:200px;height:5px;
  background:rgba(255,255,255,.08);
  border:2px solid var(--primary);overflow:hidden;
}
.load-bar{height:100%;background:var(--primary);animation:sweep 1.2s linear infinite;}
@keyframes sweep{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
.load-text{font-family:var(--fp);font-size:7px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;}

/* ── NEWTON'S CRADLE ── */
.cradle-wrap{position:relative;width:240px;height:106px;margin:6px auto;flex-shrink:0;}
.cradle-bar{
  position:absolute;top:0;left:28px;right:28px;height:5px;
  background:linear-gradient(90deg,var(--primary),var(--accent),var(--primary));
  box-shadow:0 0 8px var(--primary);
}
.c-arm{
  position:absolute;top:5px;width:3px;height:62px;
  background:rgba(255,255,255,.22);
  transform-origin:top center;
}
.c-arm::after{
  content:'';position:absolute;bottom:-16px;left:50%;
  transform:translateX(-50%);
  width:18px;height:18px;border:2px solid #000;
  background:var(--bc,#FFD700);box-shadow:0 0 9px var(--bc,#FFD700);
}
.ca-1{left:64px; --bc:#FF00BB;animation:pendulumLeft  2s linear infinite;}
.ca-2{left:96px; --bc:#BF00FF;}
.ca-3{left:128px;--bc:#00FFCC;}
.ca-4{left:160px;--bc:#FFD700;}
.ca-5{left:192px;--bc:#6600FF;animation:pendulumRight 2s linear infinite;}
/* Per-keyframe timing: ease-in swinging DOWN (apex→center), ease-out swinging UP (center→apex).
   Linear overall so the per-keyframe functions take full effect.
   Symmetric 25/50/75 split: left hits at 25%, right returns at 75%. */
@keyframes pendulumLeft{
  0%  {transform:rotate(-42deg);animation-timing-function:ease-in;}
  25% {transform:rotate(0deg);  animation-timing-function:linear;}
  75% {transform:rotate(0deg);  animation-timing-function:ease-out;}
  100%{transform:rotate(-42deg);}
}
@keyframes pendulumRight{
  0%  {transform:rotate(0deg);  animation-timing-function:linear;}
  25% {transform:rotate(0deg);  animation-timing-function:ease-out;}
  50% {transform:rotate(42deg); animation-timing-function:ease-in;}
  75% {transform:rotate(0deg);  animation-timing-function:linear;}
  100%{transform:rotate(0deg);}
}

/* ── VORTEX ── */
.vortex-wrap{
  position:relative;width:140px;height:140px;
  margin:6px auto;flex-shrink:0;
}
.vx-ring{
  position:absolute;top:50%;left:50%;
  border:3px solid var(--vc,#00FFCC);
  box-shadow:0 0 7px var(--vc,#00FFCC);
  transform:translate(-50%,-50%);
}
.vx-1{width:22px; height:22px; --vc:#FF00BB;animation:vxSpin  .6s linear infinite;}
.vx-2{width:46px; height:46px; --vc:#BF00FF;animation:vxSpin 1.1s linear reverse infinite;animation-delay:-.25s;}
.vx-3{width:72px; height:72px; --vc:#6600FF;animation:vxSpin 1.7s linear infinite;animation-delay:-.5s;}
.vx-4{width:98px; height:98px; --vc:#00FFCC;animation:vxSpin 2.5s linear reverse infinite;animation-delay:-.8s;}
.vx-5{width:124px;height:124px;--vc:#FF2D95;animation:vxSpin 3.6s linear infinite;animation-delay:-1.2s;}
@keyframes vxSpin{
  from{transform:translate(-50%,-50%) rotate(0deg);}
  to  {transform:translate(-50%,-50%) rotate(360deg);}
}
.vx-core{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:10px;height:10px;
  background:#FFD700;box-shadow:0 0 12px #FFD700,0 0 24px #FFD700;
  animation:vxPulse .5s steps(2) infinite;
}
@keyframes vxPulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.6);}
}

/* —— REBUILT LOADING SYSTEM —— */
#loading{
  display:grid;place-items:center;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,0,187,.2), transparent 34%),
    radial-gradient(circle at 50% 100%, rgba(0,255,204,.14), transparent 38%),
    linear-gradient(180deg,#040410 0%, #090A1D 50%, #040410 100%);
}
#loading::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(circle at center, rgba(0,255,204,.08), transparent 48%),
    repeating-linear-gradient(180deg, rgba(255,255,255,.035) 0 1px, transparent 1px 4px);
  opacity:.42;
}
#loading::after{
  content:'';position:absolute;inset:auto 0 0 0;height:34vh;pointer-events:none;
  background:
    linear-gradient(180deg, transparent 0%, rgba(0,0,0,.12) 12%, rgba(0,0,0,.45) 100%),
    linear-gradient(90deg, rgba(0,255,204,.14) 0 2px, transparent 2px 38px),
    linear-gradient(0deg, rgba(0,255,204,.08) 0 2px, transparent 2px 34px);
  mask-image:linear-gradient(180deg, transparent, #000 25%);
  opacity:.35;
}
#loading > img.load-logo,
#loading > #anim-rgb,
#loading > #anim-cradle,
#loading > #anim-vortex,
#loading > .load-bar-wrap,
#loading > .load-text{
  display:none;
}
.loading-shell{
  position:relative;z-index:1;
  width:min(92vw,560px);
  padding:0;
  display:flex;flex-direction:column;align-items:center;gap:24px;
  background:none;
  border:none;
  box-shadow:none;
  overflow:visible;
}
.loading-shell::before{
  display:none;
}
.loading-shell::after{
  display:none;
}
.load-logo{
  width:min(70vw,228px);height:auto;
  image-rendering:pixelated;
  filter:drop-shadow(0 0 22px rgba(191,0,255,.75)) drop-shadow(0 0 10px rgba(255,0,187,.38));
  animation:
    logoArrive 1s cubic-bezier(.14,.84,.28,1.08) both,
    logoDrift 7s ease-in-out 1s infinite;
}
@keyframes logoArrive{
  0%{transform:translateY(40px) scale(.72);opacity:0;}
  68%{transform:translateY(-10px) scale(1.04);opacity:1;}
  100%{transform:translateY(0) scale(1);opacity:1;}
}
@keyframes logoDrift{
  0%,100%{transform:translateY(0) rotate(0deg);}
  20%{transform:translateY(-6px) rotate(-.9deg);}
  50%{transform:translateY(3px) rotate(.75deg);}
  80%{transform:translateY(-4px) rotate(-.55deg);}
}
.loading-stage{
  position:relative;
  width:min(100%,440px);height:198px;
  background:
    radial-gradient(circle at 50% 45%, rgba(255,0,187,.16), transparent 32%),
    radial-gradient(circle at 50% 62%, rgba(0,255,204,.12), transparent 38%);
  border:none;
  box-shadow:none;
  overflow:visible;
}
.loading-stage::before{
  content:'';position:absolute;inset:10% 8%;pointer-events:none;
  background:
    radial-gradient(circle at 30% 50%, rgba(255,0,187,.12), transparent 30%),
    radial-gradient(circle at 70% 50%, rgba(0,255,204,.12), transparent 34%);
  filter:blur(24px);
  animation:stageAura 7s ease-in-out infinite alternate;
}
.loading-stage::after{
  content:'';position:absolute;left:8%;right:8%;bottom:26px;height:2px;
  background:linear-gradient(90deg, transparent, rgba(0,255,204,.32), transparent);
  filter:blur(.4px);
  opacity:.8;
}
@keyframes stageAura{
  0%{transform:translateX(-6px) scale(.96);opacity:.7;}
  100%{transform:translateX(6px) scale(1.04);opacity:1;}
}
.loading-scene{
  position:absolute;inset:0;
  display:grid;place-items:center;
  opacity:0;visibility:hidden;
  filter:blur(8px);
  transform:translateY(10px) scale(.96);
  transition:opacity .55s ease, transform .55s ease, filter .55s ease, visibility 0s linear .55s;
}
.loading-scene.is-active{
  opacity:1;visibility:visible;
  filter:blur(0);
  transform:translateY(0) scale(1);
  transition-delay:0s;
}

.relay-system{
  position:relative;width:320px;height:132px;
  animation:relayFloat 6s ease-in-out infinite;
}
.relay-system::before{
  content:'';position:absolute;left:20px;right:18px;top:82px;height:38px;
  background:radial-gradient(circle at center, rgba(0,255,204,.16), transparent 58%);
  filter:blur(18px);opacity:.45;
}
.relay-line,.relay-rise{
  position:absolute;
  background:linear-gradient(90deg, rgba(0,255,204,.2), var(--primary), rgba(0,255,204,.2));
  box-shadow:0 0 12px rgba(0,255,204,.45);
}
.relay-line{height:4px;}
.relay-rise{width:4px;background:linear-gradient(180deg, rgba(255,0,187,.22), var(--accent), rgba(255,0,187,.22));box-shadow:0 0 12px rgba(255,0,187,.4);}
.rl-a{width:92px;left:34px;top:92px;}
.rl-b{width:74px;left:126px;top:56px;}
.rl-c{width:86px;left:200px;top:92px;}
.rl-d{width:70px;left:286px;top:56px;}
.rr-a{height:36px;left:126px;top:56px;}
.rr-b{height:36px;left:200px;top:56px;}
.rr-c{height:36px;left:286px;top:56px;}
.relay-node{
  position:absolute;width:18px;height:18px;
  border:3px solid #000;
  background:var(--node,#FFD700);
  box-shadow:0 0 18px rgba(255,255,255,.2);
  animation:relayNodeGlow 2.8s ease-in-out infinite;
}
.relay-node::after{
  content:'';position:absolute;inset:-8px;
  border:2px solid var(--node,#FFD700);
  opacity:0;animation:nodePing 2.6s linear infinite;
}
.rn-1{left:24px;top:84px;--node:#FFD700;}
.rn-2{left:118px;top:48px;--node:#FF00BB;}
.rn-3{left:192px;top:84px;--node:#00FFCC;}
.rn-4{left:278px;top:48px;--node:#BF00FF;}
.rn-5{left:344px;top:84px;--node:#00D1FF;}
.rn-2::after{animation-delay:.35s;}
.rn-3::after{animation-delay:.7s;}
.rn-4::after{animation-delay:1.05s;}
.rn-5::after{animation-delay:1.4s;}
.rn-2{animation-delay:.2s;}
.rn-3{animation-delay:.4s;}
.rn-4{animation-delay:.6s;}
.rn-5{animation-delay:.8s;}
.relay-packet{
  position:absolute;left:0;top:0;
  width:14px;height:14px;
  border:2px solid #000;
  background:#fff;
  box-shadow:0 0 16px rgba(255,255,255,.9), 0 0 28px rgba(255,0,187,.22);
  animation:relayPacket 3.3s cubic-bezier(.32,0,.18,1) infinite;
}
@keyframes relayPacket{
  0%{transform:translate(28px,86px) scale(.75);opacity:0;}
  8%{transform:translate(44px,86px) scale(1);opacity:1;}
  22%{transform:translate(118px,86px) scale(1);}
  28%{transform:translate(118px,50px) scale(1.08);}
  42%{transform:translate(192px,50px) scale(1);}
  50%{transform:translate(192px,86px) scale(1.08);}
  68%{transform:translate(278px,86px) scale(1);}
  76%{transform:translate(278px,50px) scale(1.08);}
  92%{transform:translate(344px,50px) scale(.96);}
  100%{transform:translate(344px,86px) scale(.72);opacity:.28;}
}
@keyframes nodePing{
  0%,18%,100%{transform:scale(.65);opacity:0;}
  8%{transform:scale(1.05);opacity:.65;}
}
@keyframes relayNodeGlow{
  0%,100%{transform:scale(1);filter:brightness(1);}
  50%{transform:scale(1.08);filter:brightness(1.2);}
}
@keyframes relayFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
}

.cradle-wrap{
  position:relative;width:300px;height:142px;
  animation:cradleFloat 4.8s ease-in-out infinite;
}
.cradle-frame{
  position:absolute;left:44px;right:44px;top:24px;bottom:24px;
}
.cradle-frame::before,
.cradle-frame::after{
  content:'';position:absolute;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg, rgba(0,255,204,.52), rgba(255,0,187,.22));
  box-shadow:0 0 12px rgba(0,255,204,.18);
}
.cradle-frame::before{left:0;}
.cradle-frame::after{right:0;}
.cradle-wrap::before{
  content:'';position:absolute;left:118px;right:118px;top:96px;height:8px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
  filter:blur(2px);
  opacity:0;
  animation:cradleCollision 1.9s linear infinite;
}
.cradle-wrap::after{
  content:'';position:absolute;left:60px;right:60px;bottom:8px;height:18px;
  background:radial-gradient(circle at center, rgba(0,255,204,.18), transparent 64%);
  filter:blur(10px);opacity:.5;
}
.cradle-base{
  position:absolute;left:44px;right:44px;bottom:18px;height:8px;
  background:linear-gradient(90deg, rgba(255,0,187,.4), rgba(0,255,204,.55), rgba(255,0,187,.4));
  box-shadow:0 0 16px rgba(0,255,204,.18);
}
.cradle-bar{
  position:absolute;top:22px;left:44px;right:44px;height:5px;
  background:linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
  box-shadow:0 0 10px rgba(0,255,204,.35);
}
.c-arm{
  position:absolute;top:27px;width:3px;height:74px;
  background:rgba(255,255,255,.22);
  transform-origin:top center;
}
.c-arm::after{
  content:'';position:absolute;bottom:-20px;left:50%;
  transform:translateX(-50%);
  width:22px;height:22px;
  border:2px solid #000;
  background:var(--bc,#FFD700);
  box-shadow:0 0 12px rgba(255,255,255,.18);
}
.ca-1{left:74px; --bc:#FF00BB; animation:pendulumLeft 1.9s linear infinite;}
.ca-2{left:112px;--bc:#BF00FF;}
.ca-3{left:150px;--bc:#00FFCC;}
.ca-4{left:188px;--bc:#FFD700;}
.ca-5{left:226px;--bc:#00D1FF;animation:pendulumRight 1.9s linear infinite;}
@keyframes pendulumLeft{
  0%{transform:rotate(-30deg);animation-timing-function:ease-in;}
  24%{transform:rotate(0deg);animation-timing-function:linear;}
  76%{transform:rotate(0deg);animation-timing-function:ease-out;}
  100%{transform:rotate(-30deg);}
}
@keyframes pendulumRight{
  0%{transform:rotate(0deg);animation-timing-function:linear;}
  24%{transform:rotate(0deg);animation-timing-function:ease-out;}
  50%{transform:rotate(30deg);animation-timing-function:ease-in;}
  76%{transform:rotate(0deg);animation-timing-function:linear;}
  100%{transform:rotate(0deg);}
}
@keyframes cradleCollision{
  0%,21%,29%,71%,79%,100%{opacity:0;transform:scaleX(.6);}
  24%,76%{opacity:.85;transform:scaleX(1);}
}
@keyframes cradleFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-4px);}
}

.orbit-system{
  position:relative;width:220px;height:220px;
  animation:orbitFloat 7s ease-in-out infinite;
}
.orbit-system::before{
  content:'';position:absolute;inset:34px;
  background:radial-gradient(circle at center, rgba(255,0,187,.18), transparent 62%);
  filter:blur(24px);opacity:.7;
}
.orbit-ring{
  position:absolute;top:50%;left:50%;
  width:var(--size);height:var(--size);
  transform:translate(-50%,-50%) rotate(var(--tilt)) scaleY(var(--squash));
  border:2px solid rgba(255,255,255,.08);
  border-top-color:var(--orbit);
  border-left-color:var(--orbit);
  border-radius:50%;
  animation:orbitSpin var(--dur) linear infinite;
}
.orbit-ring.reverse{animation-direction:reverse;}
.ring-a{--size:72px; --orbit:#FF00BB; --dur:2.1s; --tilt:-18deg; --squash:.8;}
.ring-b{--size:116px;--orbit:#BF00FF; --dur:2.9s; --tilt:16deg; --squash:.68;}
.ring-c{--size:164px;--orbit:#00FFCC; --dur:3.8s; --tilt:0deg; --squash:.9;}
.orbit-satellite{
  position:absolute;left:50%;top:-9px;
  width:16px;height:16px;
  transform:translateX(-50%);
  border:2px solid #000;
  border-radius:50%;
  background:var(--orbit);
  box-shadow:0 0 14px rgba(255,255,255,.22);
}
.orbit-core{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:28px;height:28px;
  border:3px solid #000;
  background:#FFD700;
  box-shadow:0 0 16px rgba(255,215,0,.55), 0 0 34px rgba(255,215,0,.25);
  animation:corePulse 1.15s ease-in-out infinite;
}
.orbit-core::after{
  content:'';position:absolute;inset:-12px;
  border:2px solid rgba(255,215,0,.45);
  border-radius:50%;
  animation:coreEcho 1.8s ease-out infinite;
}
@keyframes orbitSpin{
  from{transform:translate(-50%,-50%) rotate(var(--tilt)) scaleY(var(--squash)) rotate(0deg);}
  to{transform:translate(-50%,-50%) rotate(var(--tilt)) scaleY(var(--squash)) rotate(360deg);}
}
@keyframes corePulse{
  0%,100%{transform:translate(-50%,-50%) scale(.94);}
  50%{transform:translate(-50%,-50%) scale(1.14);}
}
@keyframes coreEcho{
  0%{transform:scale(.72);opacity:.6;}
  100%{transform:scale(1.3);opacity:0;}
}
@keyframes orbitFloat{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

.load-bar-wrap{
  width:min(100%,340px);height:8px;
  padding:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.14), transparent);
  border:none;
  box-shadow:none;
  overflow:visible;
}
.load-bar{
  width:30%;height:100%;
  background:linear-gradient(90deg, rgba(0,255,204,.15), rgba(0,255,204,.95), rgba(255,0,187,.85));
  box-shadow:0 0 18px rgba(0,255,204,.42);
  animation:loadSweep 2s ease-in-out infinite;
}
@keyframes loadSweep{
  0%{transform:translateX(-160%) skewX(-20deg);}
  58%{transform:translateX(265%) skewX(-20deg);}
  100%{transform:translateX(265%) skewX(-20deg);}
}
.load-text{
  font-family:var(--fp);font-size:7px;
  color:rgba(255,255,255,.72);
  letter-spacing:3px;text-transform:uppercase;text-align:center;
  text-shadow:0 0 10px rgba(0,255,204,.25);
  animation:loadTextPulse 2.8s ease-in-out infinite;
}
@keyframes loadTextPulse{
  0%,100%{opacity:.7;letter-spacing:3px;}
  50%{opacity:1;letter-spacing:4px;}
}

/* ═══════════════════════════════════════════
   GAME WRAPPER
═══════════════════════════════════════════ */
#game-wrap{display:none;}
#game-wrap.ready{display:block;}

/* ═══════════════════════════════════════════
   HEADER  (10% slimmer, logo half below)
═══════════════════════════════════════════ */
.ghdr{
  background:#FF2D95;
  border-bottom:3px solid #BF00FF;
  box-shadow:0 3px 0 #000, 0 6px 0 rgba(191,0,255,.3);
  padding:7px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  position:sticky;top:0;z-index:100;
  overflow:visible;
  min-height:76px;
}

/* pixel scanline on header */
.ghdr::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,rgba(0,0,0,.07) 0px,rgba(0,0,0,.07) 1px,
    transparent 1px,transparent 3px
  );
}

/* logo — bottom half overlaps content below header */
.ghdr-logo{
  height:126px;width:auto;cursor:pointer;
  position:absolute;left:50%;transform:translateX(-50%);
  top:calc(50% - 63px); /* center vertically so bottom half is below */
  z-index:101;
  filter:drop-shadow(0 6px 16px rgba(0,0,0,.9)) drop-shadow(0 0 12px rgba(191,0,255,.5));
  transition:filter .2s,transform .2s;
  image-rendering:pixelated;
  animation:logoHeaderShake 3s steps(4) infinite;
}
@keyframes logoHeaderShake{
  0%,80%,100%{transform:translateX(-50%) rotate(0deg);}
  85%         {transform:translateX(-50%) rotate(-2deg);}
  90%         {transform:translateX(-50%) rotate(2deg);}
  95%         {transform:translateX(-50%) rotate(-1deg);}
}
.ghdr-logo:hover{
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.9)) drop-shadow(0 0 22px var(--primary));
  animation:none;transform:translateX(-50%) scale(1.06);
}

/* ── RETRO PIXEL NAV BUTTONS ── */
.ghdr-btn{
  display:flex;align-items:center;gap:5px;
  padding:6px 10px;
  background:#0A0A1E;
  border:3px solid #2A1166;
  box-shadow:3px 3px 0 #000;
  color:rgba(255,255,255,.6);
  font-family:var(--fp);font-size:7px;
  cursor:pointer;text-decoration:none;
  text-transform:uppercase;letter-spacing:1px;
  transition:all .07s;
  white-space:nowrap;
  position:relative;z-index:102;
}
.ghdr-btn:hover{
  border-color:var(--primary);color:var(--primary);
  box-shadow:3px 3px 0 #000,0 0 8px rgba(0,255,204,.25);
  transform:translate(-1px,-1px);
}
.ghdr-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}
.ghdr-btn-end{border-color:#550022;}
.ghdr-btn-end:hover{border-color:var(--danger);color:var(--danger);box-shadow:3px 3px 0 #000,0 0 8px rgba(255,68,68,.25);}

/* ═══════════════════════════════════════════
   SCOREBOARD  (retro pixel cards — split either side of logo)
═══════════════════════════════════════════ */
.scorebar-left,.scorebar-right{
  display:flex;align-items:center;gap:6px;flex:1;
  overflow:visible;padding:2px 0;
}
.scorebar-left{justify-content:flex-end;}
.scorebar-right{justify-content:flex-start;}
/* spacer reserves room for the centered logo */
.logo-spacer{
  width:150px;flex-shrink:0;
}

/* ── SCORE CHIP: horizontal "NAME (SCORE)" pill ── */
.score-chip{
  display:flex;align-items:center;gap:0;
  background:#070718;
  border:2px solid rgba(255,255,255,.08);
  border-left:4px solid var(--tc,#00FFCC);
  box-shadow:3px 3px 0 #000;
  position:relative;overflow:visible;flex-shrink:0;
  transition:border-color .2s,box-shadow .2s;
}
/* top glow line */
.score-chip::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:var(--tc,#00FFCC);opacity:.55;
  box-shadow:0 0 6px var(--tc,#00FFCC);
}
.score-chip.active-team{animation:scoreFlash .4s steps(4);}
@keyframes scoreFlash{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.07);box-shadow:3px 3px 0 #000,0 0 14px var(--tc,#00FFCC);}
}
/* team name — Nunito for legibility */
.chip-name{
  font-family:var(--fb);font-weight:900;font-size:12px;
  text-transform:uppercase;letter-spacing:.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:88px;
  color:var(--tc,#00FFCC);text-shadow:0 0 6px var(--tc,#00FFCC);
  padding:6px 4px 6px 9px;
}
/* (score) section */
.chip-score-wrap{
  display:flex;align-items:center;gap:1px;
  padding:6px 9px 6px 4px;
}
.chip-paren{
  font-family:var(--fp);font-size:8px;
  color:rgba(255,255,255,.3);line-height:1;
}
.chip-score{
  font-family:var(--fp);font-size:14px;line-height:1;
  color:#fff;text-shadow:2px 2px 0 #000;
  cursor:pointer;transition:color .12s,text-shadow .12s;
}
.chip-score:hover{color:var(--primary);text-shadow:0 0 10px var(--primary);}
.score-popup{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  font-family:var(--fp);font-size:9px;font-weight:900;
  animation:popUp 1.4s ease forwards;pointer-events:none;white-space:nowrap;
}
@keyframes popUp{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-28px)}}

/* ── SCORE IMPACT ANIMATIONS ── */
.score-burst{
  position:fixed;font-family:var(--fp);
  font-size:clamp(20px,4vw,36px);line-height:1.2;
  pointer-events:none;z-index:9100;white-space:nowrap;text-align:center;
}
.score-burst-gain{
  color:#00FFCC;text-shadow:0 0 16px #00FFCC,3px 3px 0 #000;
  animation:burstGain .85s cubic-bezier(.15,.9,.3,1) forwards;
}
.score-burst-lose{
  color:#FF4444;text-shadow:0 0 16px #FF4444,3px 3px 0 #000;
  animation:burstLose .85s cubic-bezier(.15,.9,.3,1) forwards;
}
@keyframes burstGain{
  0%  {opacity:1;transform:translate(-50%,-50%) scale(.15) rotate(-12deg);}
  45% {opacity:1;transform:translate(-50%,-70%) scale(1.2) rotate(6deg);}
  70% {opacity:.9;transform:translate(-50%,-80%) scale(1.1) rotate(-2deg);}
  100%{opacity:0;transform:translate(-50%,-110%) scale(1.3) rotate(0deg);}
}
@keyframes burstLose{
  0%  {opacity:0;transform:translate(-50%,-130%) scale(1.5);}
  28% {opacity:1;transform:translate(-50%,-50%) scale(.8);}
  55% {opacity:1;transform:translate(-50%,-50%) scale(1.05);}
  80% {opacity:.7;transform:translate(-50%,-50%) scale(.95);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(.9);}
}
.score-chip.bounce-anim{animation:chipBounce .7s ease-out forwards !important;}
.score-chip.shake-anim {animation:chipShake  .6s ease-out forwards !important;}
@keyframes chipBounce{
  0%  {transform:translateY(0) scale(1);}
  18% {transform:translateY(-14px) scale(1.12);}
  38% {transform:translateY(3px) scale(.95);}
  55% {transform:translateY(-6px) scale(1.05);}
  72% {transform:translateY(1px) scale(.99);}
  100%{transform:translateY(0) scale(1);}
}
@keyframes chipShake{
  0%,100%{transform:translateX(0) scale(1);}
  8%  {transform:translateX(-9px) scale(.96);}
  18% {transform:translateX(9px)  scale(.96);}
  28% {transform:translateX(-7px);}
  38% {transform:translateX(7px);}
  48% {transform:translateX(-5px);}
  58% {transform:translateX(5px);}
  68% {transform:translateX(-3px);}
  80% {transform:translateX(3px);}
}

/* ═══════════════════════════════════════════
   BOARD
═══════════════════════════════════════════ */
.board-toolbar{
  display:flex;align-items:center;justify-content:flex-end;gap:8px;
  padding:6px 16px;
  margin-top:22px;
  background:var(--panel2);
  border-bottom:1px solid rgba(255,255,255,.06);
  margin-top:66px; /* space for logo overhang */
}
.zoom-btn{
  width:30px;height:30px;
  background:var(--gray);border:2px solid rgba(255,255,255,.15);
  border-radius:var(--radius);
  color:var(--text);font-size:18px;font-weight:bold;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color .12s;line-height:1;
}
.zoom-btn:hover{border-color:var(--primary);}
.zoom-lbl{font-family:var(--fh);font-size:13px;color:var(--text2);min-width:48px;text-align:center;}

.board-wrap{padding:16px;overflow-x:auto;}
.board{display:grid;gap:8px;min-width:400px;}
.board-cell{
  border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  text-align:center;padding:10px 8px;
  font-family:var(--fh);
  transition:all .15s;position:relative;overflow:hidden;
}
.cat-cell{
  background:var(--cat-bg);border:2px solid var(--border);
  color:var(--cat-color);
  font-size:calc(clamp(12px,1.8vw,16px) * var(--bz));
  min-height:calc(60px * var(--bz));
  letter-spacing:.3px;line-height:1.2;text-transform:uppercase;
}
.q-cell{
  background:var(--cell-bg);border:2px solid var(--border);
  cursor:pointer;min-height:calc(72px * var(--bz));flex-direction:column;gap:4px;
}
.q-cell:hover:not(.used){
  background:var(--cell-hover);border-color:var(--primary);
  transform:translateY(-2px);box-shadow:0 0 14px rgba(0,255,204,.25);
}
.q-cell.used{
  background:var(--cell-used);border-color:rgba(255,255,255,.06);
  cursor:default;transform:none;box-shadow:none;
}
.cell-pts{font-size:calc(clamp(18px,3vw,28px) * var(--bz));color:var(--accent);line-height:1;}
.q-cell.used .cell-pts{color:var(--cell-used-text);}
.cell-check{font-size:calc(18px * var(--bz));opacity:.4;}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.8);z-index:500;
  align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.active{display:flex;}
.modal{
  background:var(--panel2);
  border:3px solid var(--border);
  border-radius:var(--radius);
  width:100%;max-width:640px;max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow);position:relative;
  animation:modalIn .2s ease;
}
@keyframes modalIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{
  background:var(--panel);border-bottom:2px solid var(--border);
  padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.modal-cat{font-family:var(--fh);font-size:13px;color:var(--primary);letter-spacing:1px;text-transform:uppercase;}
.modal-pts{font-family:var(--fh);font-size:24px;color:var(--accent);line-height:1;}
.modal-close{
  width:32px;height:32px;border-radius:50%;
  background:var(--gray);border:2px solid rgba(255,255,255,.15);
  color:var(--text2);font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .12s;flex-shrink:0;
}
.modal-close:hover{border-color:var(--danger);color:var(--danger);}
.modal-body{padding:18px;}
.q-text{font-size:clamp(16px,2.5vw,22px);font-weight:800;line-height:1.45;margin-bottom:16px;text-align:center;}

/* Timer */
.modal-timer-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:14px;overflow:hidden;}
.modal-timer-fill{height:100%;background:var(--primary);transition:width 1s linear;width:100%;}
.modal-timer-fill.warning{background:var(--danger);}

/* MC */
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.mc-opt{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:var(--gray);border:2px solid rgba(255,255,255,.12);border-radius:var(--radius);
  color:var(--text);font-family:var(--fb);font-weight:800;font-size:13px;
  cursor:pointer;text-align:left;transition:all .12s;
}
.mc-opt:hover:not(:disabled){border-color:var(--primary);background:rgba(0,255,204,.06);}
.mc-letter{
  width:26px;height:26px;border-radius:50%;
  background:var(--border);color:var(--bg);
  font-family:var(--fh);font-size:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.mc-opt.correct{background:rgba(0,255,204,.15);border-color:var(--primary) !important;}
.mc-opt.correct .mc-letter{background:var(--primary);color:#000;}
.mc-opt.wrong{background:rgba(255,68,68,.15);border-color:var(--danger) !important;}
.mc-opt.wrong .mc-letter{background:var(--danger);color:#fff;}
.mc-opt:disabled{cursor:default;}

/* Drawing */
.drawing-section{margin-bottom:14px;}
.canvas-wrap{background:rgba(255,255,255,.97);border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:crosshair;}
.drawing-canvas{display:block;width:100%;touch-action:none;}
.draw-tools{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;align-items:center;}
.draw-btn{width:26px;height:26px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:border-color .12s;flex-shrink:0;}
.draw-btn.active{border-color:var(--text);}
.draw-clear{
  padding:5px 12px;background:var(--gray);
  border:2px solid rgba(255,255,255,.15);border-radius:var(--radius);
  color:var(--text);font-family:var(--fb);font-weight:800;font-size:12px;
  cursor:pointer;margin-left:auto;
}

/* Answer box */
.answer-box{
  background:rgba(0,255,204,.07);border:2px solid var(--primary);border-radius:var(--radius);
  padding:12px 14px;margin-bottom:12px;display:none;
}
.answer-box.shown{display:block;}
.answer-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--primary);margin-bottom:4px;}
.answer-text{font-size:16px;font-weight:800;line-height:1.4;}

/* Award */
.award-section{display:none;}
.award-section.shown{display:block;}
.award-title{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:6px;}
.award-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-bottom:8px;}
.award-btn{
  padding:8px 10px;border-radius:var(--radius);
  background:var(--gray);border:2px solid;
  font-family:var(--fb);font-weight:800;font-size:12px;
  cursor:pointer;transition:all .12s;text-align:center;
}
.award-btn:hover{filter:brightness(1.2);}

/* Action buttons */
.action-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn-reveal{
  flex:1;padding:12px;
  background:var(--primary);border:3px solid rgba(0,0,0,.2);border-radius:var(--radius);
  color:var(--bg);font-family:var(--fh);font-size:16px;
  cursor:pointer;transition:all .12s;box-shadow:0 0 14px rgba(0,255,204,.25);
}
.btn-reveal:hover{filter:brightness(1.1);}
.btn-done{
  padding:12px 20px;
  background:var(--gray);border:2px solid rgba(255,255,255,.15);border-radius:var(--radius);
  color:var(--text);font-family:var(--fh);font-size:15px;
  cursor:pointer;transition:all .12s;display:none;
}
.btn-done:hover{border-color:var(--text);}

/* ═══════════════════════════════════════════
   WINNER SCREEN
═══════════════════════════════════════════ */
#winner-screen{display:none;min-height:100vh;}
#winner-screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;}
.winner-title{font-family:var(--fp);font-size:clamp(14px,4vw,28px);color:var(--primary);text-align:center;margin-bottom:6px;text-shadow:0 0 20px rgba(0,255,204,.5),3px 3px 0 #000;}
.winner-subtitle{font-family:var(--fp);font-size:clamp(10px,2.5vw,18px);text-align:center;margin-bottom:8px;}
.winner-pts{font-size:18px;font-weight:800;color:var(--text2);text-align:center;margin-bottom:28px;}
.final-cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:32px;}
.final-card{
  background:var(--panel);
  border:3px solid;
  box-shadow:4px 4px 0 #000;
  padding:18px 22px;text-align:center;min-width:120px;
}
.final-rank{font-size:28px;margin-bottom:4px;}
.final-name{font-family:var(--fp);font-size:9px;margin-bottom:6px;}
.final-score{font-family:var(--fp);font-size:14px;}

/* 3 winner buttons */
.winner-actions{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  width:100%;max-width:360px;
}
.btn-winner{
  width:100%;padding:14px 24px;
  font-family:var(--fp);font-size:9px;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;
  transition:all .08s;text-align:center;
}
.btn-winner-primary{
  background:var(--primary);
  border:4px solid #00CCAA;border-bottom:4px solid #007755;
  box-shadow:4px 4px 0 #000,0 0 18px rgba(0,255,204,.3);
  color:#000;
}
.btn-winner-primary:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #000,0 0 24px rgba(0,255,204,.5);}
.btn-winner-secondary{
  background:#1A0A3A;
  border:4px solid #5500BB;border-bottom:4px solid #220055;
  box-shadow:4px 4px 0 #000;
  color:var(--primary);
}
.btn-winner-secondary:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #000,0 0 14px rgba(0,255,204,.2);}
.btn-winner-ghost{
  background:transparent;
  border:3px solid rgba(255,255,255,.2);
  box-shadow:3px 3px 0 #000;
  color:var(--text2);
}
.btn-winner-ghost:hover{border-color:rgba(255,255,255,.5);color:#fff;transform:translate(-1px,-1px);}
.btn-winner:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #000 !important;}

/* ═══════════════════════════════════════════
   MYSTERY SCREEN
═══════════════════════════════════════════ */
#mystery-screen{
  display:none;position:fixed;inset:0;background:var(--bg);
  z-index:950;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
#mystery-screen.active{display:flex;}
.myst-q{
  font-family:var(--fp);font-size:clamp(80px,20vw,140px);line-height:1;
  color:var(--accent);text-shadow:0 0 40px rgba(255,0,187,.7),4px 4px 0 #000;
  animation:mystQ .5s steps(2) infinite;
}
@keyframes mystQ{
  0%,100%{color:var(--accent);transform:scale(1);}
  50%{color:var(--primary);transform:scale(1.1);}
}
.myst-label{
  font-family:var(--fp);font-size:9px;letter-spacing:4px;color:var(--text2);
  animation:mystBlink .7s steps(1) infinite;
}
@keyframes mystBlink{0%,100%{opacity:1;}50%{opacity:0;}}
.myst-count{
  font-family:var(--fp);font-size:clamp(50px,12vw,90px);line-height:1;
  color:var(--primary);text-shadow:0 0 30px rgba(0,255,204,.6),3px 3px 0 #000;
}

/* Confetti */
.confetti-piece{
  position:fixed;border-radius:2px;pointer-events:none;z-index:9998;
  animation:fall linear forwards;
}
@keyframes fall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0;}
}

/* Verdict flash */
#verdict-flash{
  position:fixed;inset:0;z-index:8000;pointer-events:none;
  display:flex;align-items:center;justify-content:center;opacity:0;
}
#verdict-flash.show-correct{animation:vFlashC .9s ease forwards;}
#verdict-flash.show-wrong{animation:vFlashW .9s ease forwards;}

    clear:'🗑 Limpar', winner:'🏆 Vencedor!', playAgain:'▶ Jogar Novamente',
    sameTeams:'↺ Mesmos Times, Novo Jogo', home:'⌂ Início',
    pts:'pontos', generating:'Gerando seu jogo...',
    errorGen:'Erro ao gerar o jogo. Volte e tente novamente.',
    noConfig:'Configuração não encontrada. Volte ao início.',
    calculating:'CALCULANDO...',
  },
  es:{
    back:'Inicio', end:'🏆 Fin', reveal:'Revelar Respuesta', done:'Listo ✓',
    answer:'Respuesta', award:'¿Quién respondió?', correct:'✓ Correcto', wrong:'✗ Incorrecto',
    clear:'🗑 Limpiar', winner:'🏆 ¡Ganador!', playAgain:'▶ Jugar de Nuevo',
    sameTeams:'↺ Mismos Equipos, Nuevo Juego', home:'⌂ Inicio',
    pts:'puntos', generating:'Generando tu juego...',
    errorGen:'Error al generar el juego. Vuelve e intenta de nuevo.',
    noConfig:'Configuración no encontrada. Vuelve al inicio.',
    calculating:'CALCULANDO...',
  }
};

let cfg={}, gameData=null, teams=[], lang='en';
let currentCell=null, timerInterval=null;
let drawCtx=null, isDrawing=false, drawColor='#000000';
let mcAnswered=null;
let openOutcome=null;
let loadingSceneTimer=null;
let activeLoadingSceneIndex=0;
const MAX_GENERATION_ATTEMPTS=3;

function cleanText(value){
  return String(value ?? '').trim();
}

function normalizeAnswerKey(value){
  return cleanText(value)
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .toLowerCase()
    .replace(/["'`]/g,'')
    .replace(/[.,;:!?]/g,'')
    .replace(/\s+/g,' ')
    .trim();
}

function findCorrectOptionIndex(options, answer, correctIndex){
  const answerKey=normalizeAnswerKey(answer);
  const matchedIndex=options.findIndex(opt=>{
    const optionKey=normalizeAnswerKey(opt);
    return optionKey===answerKey || optionKey.includes(answerKey) || answerKey.includes(optionKey);
  });
  if(matchedIndex>=0) return matchedIndex;
  if(Number.isInteger(correctIndex) && correctIndex>=0 && correctIndex<options.length) return correctIndex;
  return -1;
}

function sanitizeQuestion(rawQuestion, colIndex, rowIndex){
  if(!rawQuestion || typeof rawQuestion!=='object'){
    throw new Error(`Invalid question object at ${colIndex}:${rowIndex}`);
  }

  const question=cleanText(rawQuestion.question);
  const answer=cleanText(rawQuestion.answer);
  if(!question || !answer){
    throw new Error(`Missing question text at ${colIndex}:${rowIndex}`);
  }

  const isDrawing=!!rawQuestion.isDrawing;
  const rawOptions=Array.isArray(rawQuestion.options)
    ? rawQuestion.options.map(cleanText).filter(Boolean).slice(0,4)
    : [];
  const parsedCorrectIndex=Number.isInteger(rawQuestion.correctIndex)
    ? rawQuestion.correctIndex
    : Number.parseInt(rawQuestion.correctIndex,10);

  if(isDrawing){
    return {question,answer,type:'drawing',options:[],correctIndex:0,isDrawing:true};
  }

  if(rawOptions.length===4){
    const correctIndex=findCorrectOptionIndex(rawOptions,answer,parsedCorrectIndex);
    if(correctIndex>=0){
      return {question,answer,type:'multiple',options:rawOptions,correctIndex,isDrawing:false};
    }
  }

  return {question,answer,type:'open',options:[],correctIndex:0,isDrawing:false};
}

function rebalanceMultipleChoiceAnswers(game){
  const multipleQuestions=[];
  game.questions.forEach(col=>{
    col.forEach(question=>{
      if(Array.isArray(question.options) && question.options.length===4){
        multipleQuestions.push(question);
      }
    });
  });

  if(!multipleQuestions.length) return game;

  const offset=multipleQuestions.length===1 ? 1+Math.floor(Math.random()*3) : Math.floor(Math.random()*4);
  multipleQuestions.forEach((question,index)=>{
    const targetIndex=(index+offset)%4;
    if(question.correctIndex===targetIndex) return;
    const correctOption=question.options[question.correctIndex];
    const otherOptions=question.options.filter((_,optionIndex)=>optionIndex!==question.correctIndex);
    question.options=[
      ...otherOptions.slice(0,targetIndex),
      correctOption,
      ...otherOptions.slice(targetIndex)
    ];
    question.correctIndex=targetIndex;
  });

  return game;
}

function extractJsonObject(text){
  const source=cleanText(String(text ?? '').replace(/```json|```/gi,''));
  const start=source.indexOf('{');
  if(start<0) throw new Error('No JSON object found in response');

  let depth=0;
  let inString=false;
  let isEscaped=false;

  for(let i=start;i<source.length;i++){
    const char=source[i];

    if(inString){
      if(isEscaped){
        isEscaped=false;
      }else if(char==='\\'){
        isEscaped=true;
      }else if(char==='"'){
        inString=false;
      }
      continue;
    }

    if(char==='"'){
      inString=true;
      continue;
    }
    if(char==='{'){
      depth++;
      continue;
    }
    if(char==='}'){
      depth--;
      if(depth===0) return source.slice(start,i+1);
    }
  }

  throw new Error('Incomplete JSON object in response');
}

function transposeQuestionGrid(grid){
  return Array.from({length:grid[0].length},(_,colIndex)=>{
    return grid.map(row=>row[colIndex]);
  });
}

function normalizeQuestionColumns(rawQuestions, expectedCols, expectedRows){
  if(!Array.isArray(rawQuestions)){
    throw new Error('Invalid game schema');
  }

  const hasColumnShape=rawQuestions.length>=expectedCols
    && rawQuestions.slice(0,expectedCols).every(column=>Array.isArray(column) && column.length>=expectedRows);
  if(hasColumnShape){
    return rawQuestions.slice(0,expectedCols).map(column=>column.slice(0,expectedRows));
  }

  const hasRowShape=rawQuestions.length>=expectedRows
    && rawQuestions.slice(0,expectedRows).every(row=>Array.isArray(row) && row.length>=expectedCols);
  if(hasRowShape){
    const trimmedRows=rawQuestions.slice(0,expectedRows).map(row=>row.slice(0,expectedCols));
    return transposeQuestionGrid(trimmedRows);
  }

  const hasFlatShape=rawQuestions.length>=expectedCols*expectedRows
    && rawQuestions.slice(0,expectedCols*expectedRows).every(item=>item && typeof item==='object' && !Array.isArray(item));
  if(hasFlatShape){
    return Array.from({length:expectedCols},(_,colIndex)=>{
      const start=colIndex*expectedRows;
      return rawQuestions.slice(start,start+expectedRows);
    });
  }

  throw new Error('Unexpected game dimensions');
}

function buildRetryPayload(errorMessage){
  const payload=buildPayload();
  payload.messages.push({
    role:'user',
    content:`The previous answer could not be used: ${errorMessage}. Return ONLY raw JSON. Double-check that "categories" has exactly ${cfg.numCols} items and "questions" is an array of exactly ${cfg.numCols} category columns with exactly ${cfg.numRows} questions in each column.`
  });
  return payload;
}

function sanitizeGameData(rawGame){
  const expectedCols=cfg.numCols;
  const expectedRows=cfg.numRows;

  if(!rawGame || !Array.isArray(rawGame.categories) || !Array.isArray(rawGame.questions)){
    throw new Error('Invalid game schema');
  }

  const categories=rawGame.categories.slice(0,expectedCols).map((category,index)=>{
    const label=cleanText(category);
    return label || `Category ${index+1}`;
  });
  while(categories.length<expectedCols){
    categories.push(`Category ${categories.length+1}`);
  }

  const normalizedColumns=normalizeQuestionColumns(rawGame.questions,expectedCols,expectedRows);
  const questions=normalizedColumns.map((column,colIndex)=>{
    if(!Array.isArray(column) || column.length<expectedRows){
      throw new Error(`Unexpected question column size at ${colIndex}`);
    }
    return column.slice(0,expectedRows).map((question,rowIndex)=>sanitizeQuestion(question,colIndex,rowIndex));
  });

  return rebalanceMultipleChoiceAnswers({categories,questions});
}

async function requestGeneratedGame(){
  let lastError=null;

  for(let attempt=1;attempt<=MAX_GENERATION_ATTEMPTS;attempt++){
    try{
      const loadText=document.getElementById('load-text');
      if(loadText){
        loadText.textContent=attempt===1
          ? GT[lang].generating
          : `${GT[lang].generating} (${attempt}/${MAX_GENERATION_ATTEMPTS})`;
      }

      const res=await fetch('/api/generate',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(attempt===1 ? buildPayload() : buildRetryPayload(lastError?.message || 'Schema mismatch'))
      });
      if(!res.ok){
        let apiError=`API ${res.status}`;
        try{
          const errorData=await res.json();
          const message=errorData?.error?.message || errorData?.error || errorData?.message;
          if(message) apiError=`${message} (API ${res.status})`;
        }catch(_){
          // Keep the status-only error when the API did not return JSON.
        }
        const error=new Error(apiError);
        error.noRetry=res.status===429 || res.status===402;
        throw error;
      }

      const data=await res.json();
      const text=data.choices?.[0]?.message?.content;
      if(!text) throw new Error('Empty response');

      return sanitizeGameData(JSON.parse(extractJsonObject(text)));
    }catch(error){
      lastError=error;
      console.warn(`Game generation attempt ${attempt} failed`, error);
      if(error.noRetry) break;
    }
  }

  throw lastError || new Error('Unable to generate game');
}

function setActiveLoadingScene(index) {
  const scenes=['anim-relay','anim-cradle-stage','anim-orbit'];
  activeLoadingSceneIndex=((index%scenes.length)+scenes.length)%scenes.length;
  scenes.forEach((id,sceneIndex)=>{
    const el=document.getElementById(id);
    if(el) el.classList.toggle('is-active',sceneIndex===activeLoadingSceneIndex);
  });
}

function startLoadingSceneCycle() {
  stopLoadingSceneCycle();
  setActiveLoadingScene(Math.floor(Math.random()*3));
  loadingSceneTimer=setInterval(()=>{
    setActiveLoadingScene(activeLoadingSceneIndex+1);
  },4200);
}

function stopLoadingSceneCycle() {
  if(loadingSceneTimer){
    clearInterval(loadingSceneTimer);
    loadingSceneTimer=null;
  }
}

async function boot() {
  startLoadingSceneCycle();

  const raw=localStorage.getItem('jamboo_config');
  if(!raw){
    stopLoadingSceneCycle();
    alert(GT.en.noConfig);
    window.location.href='index.html';
    return;
  }
  cfg=JSON.parse(raw);
  lang=cfg.lang||'en';
  teams=cfg.teams.map(t=>({...t,score:0}));
  applyLabels();
  document.getElementById('load-text').textContent=GT[lang].generating;

  try {
    gameData=await requestGeneratedGame();
  } catch(e) {
    console.error(e);
    stopLoadingSceneCycle();
    alert(GT[lang].errorGen);
    document.getElementById('loading').classList.add('hidden');
    return;
  }

  stopLoadingSceneCycle();
  buildBoard();
  renderScorebar();
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('game-wrap').classList.add('ready');
}

function legacyBuildPromptPayload() {
  const {numCols,numRows,difficulty,qType,qLang,prompt}=cfg;
  const pts=Array.from({length:numRows},(_,i)=>(i+1)*100);
  const mcNote=(qType==='multiple'||qType==='mixed')
    ?'Multiple choice MUST have "options":["A","B","C","D"] (exactly 4) and "correctIndex":0–3.':'';
  const drawNote=(qType==='drawing'||qType==='mixed')
    ?'Drawing questions: set "isDrawing":true, omit options/correctIndex.':'';

  const diffMap={easy:'very easy',medium:'medium',hard:'hard',mixed:'varies by row'};
  const rowDiff=Array.from({length:numRows},(_,i)=>{
    const labels=['trivial','easy','medium','hard','very hard'];
    return `row ${i+1} (${pts[i]}pts): ${labels[Math.min(i,labels.length-1)]}`;
  }).join(', ');

  const sys=`You are a quiz game generator for educators. Create a Jeopardy-style quiz as JSON.

SCHEMA:
{"categories":["Cat1",...],"questions":[[{"question":"...","answer":"...","type":"${qType}","options":[],"correctIndex":0,"isDrawing":false},...(${numRows} items)],...(${numCols} arrays)]}

RULES:
- Exactly ${numCols} categories, ${numRows} questions each
- "questions" must be column-based: one inner array per category, not one inner array per row
- Point values and difficulty: ${rowDiff}
- All content in ${qLang}. Overall difficulty: ${diffMap[difficulty]||difficulty}. Type: ${qType}
- ${mcNote}
- IMPORTANT for MC: distribute correctIndex values across 0,1,2,3 — do NOT always use 0. Each value should appear roughly equally across the whole game.
- ${drawNote}
- Write questions that feel specific and surprising — avoid the most obvious, predictable question about a topic. Favor angles that reward genuine understanding over trivia recall.
- Return ONLY raw JSON — no explanation, no markdown.`;

  return {messages:[
    {role:'system',content:sys},
    {role:'user',content:`Topic: ${prompt}\n\nReturn ONLY valid JSON.`}
  ]};
}

  document.getElementById('lbl-reveal').textContent=G.reveal;
  document.getElementById('lbl-done').textContent=G.done;
  document.getElementById('lbl-answer').textContent=G.answer;
  document.getElementById('lbl-award').textContent=G.award;

function buildBoard() {
  const board=document.getElementById('board');
  const cols=gameData.categories.length;
  const rows=gameData.questions[0].length;
  const pts=Array.from({length:rows},(_,i)=>(i+1)*100);
  board.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  board.innerHTML='';
  gameData.categories.forEach(cat=>{
    const c=document.createElement('div');
    c.className='board-cell cat-cell';c.textContent=cat;
    board.appendChild(c);
  });
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const q=gameData.questions[c][r];
      const cell=document.createElement('div');
      cell.className='board-cell q-cell';
      cell.dataset.col=c;cell.dataset.row=r;cell.dataset.pts=pts[r];
      cell.innerHTML=`<div class="cell-pts">${pts[r]}</div>`;
      cell.onclick=()=>openQuestion(c,r,pts[r],cell);
      board.appendChild(cell);
    }
  }
}

function renderScorebar() {
  const left=document.getElementById('scorebar-left');
  const right=document.getElementById('scorebar-right');
  left.innerHTML='';right.innerHTML='';
  const half=Math.ceil(teams.length/2);
  teams.forEach((t,i)=>{
    const c=document.createElement('div');
    c.className='score-chip';c.id=`sc-${i}`;
    c.style.setProperty('--tc',t.color);
    c.innerHTML=`<div class="chip-name">${t.name}</div><div class="chip-score-wrap"><span class="chip-paren">(</span><span class="chip-score" id="sv-${i}" onclick="editScore(${i})" title="Tap to adjust score">0</span><span class="chip-paren">)</span></div>`;
    (i<half?left:right).appendChild(c);
  });
}

function openQuestion(col,row,pts,cell) {
  if(cell.classList.contains('used')) return;
  currentCell={col,row,pts,cell};
  const q=gameData.questions[col][row];
  document.getElementById('modal-cat').textContent=gameData.categories[col].toUpperCase();
  document.getElementById('modal-pts').textContent=pts;
  document.getElementById('modal-question').textContent=q.question;
  document.getElementById('mc-grid').style.display='none';
  document.getElementById('drawing-section').style.display='none';
  document.getElementById('answer-box').classList.remove('shown');
  document.getElementById('award-section').classList.remove('shown');
  document.getElementById('reveal-btn').style.display='';
  document.getElementById('reveal-btn').disabled=false;
  document.getElementById('done-btn').style.display='none';
  document.getElementById('answer-text').textContent=q.answer;
  mcAnswered=null;openOutcome=null;

  if(q.options&&q.options.length) buildMC(q);
  if(q.isDrawing){document.getElementById('drawing-section').style.display='block';setTimeout(initCanvas,60);}

  clearTimerBar();
  if(cfg.timerOn) startTimerBar(cfg.speedOn?15:30);
  document.getElementById('q-modal').classList.add('active');
}

function buildMC(q) {
  const mc=document.getElementById('mc-grid');
  mc.style.display='grid';mc.innerHTML='';
  mcAnswered=null;
  q.options.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='mc-opt';
    b.innerHTML=`<div class="mc-letter">${'ABCD'[i]}</div><span>${opt}</span>`;
    b.onclick=()=>{
      if(mcAnswered) return;
      clearTimerBar();
      mc.querySelectorAll('.mc-opt').forEach(btn=>btn.disabled=true);
      const correct=i===q.correctIndex;
      mcAnswered={selected:i,correct};
      startCountdown(()=>{
        b.classList.add(correct?'correct':'wrong');
        if(!correct){
          b.classList.add('shake');
          mc.querySelectorAll('.mc-opt')[q.correctIndex].classList.add('correct');
        }
        showVerdictFlash(correct);
        revealAnswer();
      });
    };
    mc.appendChild(b);
  });
}

function startCountdown(cb){
  const modal=document.querySelector('.modal');
  const overlay=document.createElement('div');
  overlay.className='countdown-overlay';
  const num=document.createElement('div');
  num.className='countdown-num';
  overlay.appendChild(num);
  modal.appendChild(overlay);
  let count=3;
  function tick(){
    num.textContent=count;
    num.style.animation='none';
    void num.offsetWidth;
    num.style.animation='countPop .82s ease forwards';
    count--;
    if(count>0){setTimeout(tick,820);}
    else{setTimeout(()=>{overlay.remove();cb();},820);}
  }
  tick();
}

function showVerdictFlash(correct){
  const el=document.getElementById('verdict-flash');
  const ico=document.getElementById('verdict-icon');
  el.className='';
  ico.className='verdict-icon '+(correct?'v-correct':'v-wrong');
  ico.textContent=correct?'✓':'✗';
  void el.offsetWidth;
  el.className=correct?'show-correct':'show-wrong';
  setTimeout(()=>{el.className='';},950);
}


function revealAnswer() {
  clearTimerBar();
  document.getElementById('answer-box').classList.add('shown');
  document.getElementById('reveal-btn').style.display='none';
  document.getElementById('done-btn').style.display='';
  buildAwardButtons();
  document.getElementById('award-section').classList.add('shown');
}

function buildAwardButtons(){
  const pts=currentCell?.pts||0;
  const q=gameData.questions[currentCell.col][currentCell.row];
  const isMC=!!(q.options&&q.options.length&&!q.isDrawing);
  const toggle=document.getElementById('outcome-toggle');
  if(isMC){
    toggle.style.display='none';
    openOutcome=mcAnswered?mcAnswered.correct:null;
  } else {
    toggle.style.display='flex';
    openOutcome=null;
    document.getElementById('btn-oc-correct').classList.remove('sel');
    document.getElementById('btn-oc-wrong').classList.remove('sel');
  }
  buildTeamPicker(pts);
}

function setOutcome(correct){
  openOutcome=correct;
  document.getElementById('btn-oc-correct').classList.toggle('sel',correct===true);
  document.getElementById('btn-oc-wrong').classList.toggle('sel',correct===false);
  showVerdictFlash(correct);
  buildTeamPicker(currentCell?.pts||0);
}

function buildTeamPicker(pts){
  const picker=document.getElementById('team-picker');
  picker.innerHTML='';
  const isMC=!!(currentCell&&gameData.questions[currentCell.col][currentCell.row].options?.length);
  const effectiveOutcome=isMC?(mcAnswered?.correct??null):openOutcome;
  teams.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='team-pick-btn';
    btn.style.borderColor=t.color;
    btn.textContent=t.name;
    if(effectiveOutcome===null){btn.disabled=true;}
    btn.onclick=()=>{
      if(effectiveOutcome===null) return;
      const delta=effectiveOutcome?pts:-pts;
      applyScore(i,delta,(delta>0?'+':'')+delta);
      btn.classList.add('applied');
      picker.querySelectorAll('.team-pick-btn').forEach(b=>{b.disabled=true;});
      setTimeout(()=>closeModal(),500);
    };
    picker.appendChild(btn);
  });
}

function applyScore(idx,delta,label) {
  teams[idx].score+=delta;
  const val=document.getElementById(`sv-${idx}`);
  if(val) val.textContent=teams[idx].score;
  const card=document.getElementById(`sc-${idx}`);
  if(card){
    // Small floating popup
    const pop=document.createElement('div');
    pop.className='score-popup';pop.textContent=label;
    pop.style.color=delta>0?'var(--primary)':'var(--danger)';
    card.appendChild(pop);
    setTimeout(()=>pop.remove(),1600);
    // Big impact burst at chip position
    const rect=card.getBoundingClientRect();
    const burst=document.createElement('div');
    burst.className='score-burst '+(delta>0?'score-burst-gain':'score-burst-lose');
    burst.textContent=delta>0?`💥 ${label}`:`💢 ${label}`;
    burst.style.left=(rect.left+rect.width/2)+'px';
    burst.style.top=(rect.top+rect.height/2)+'px';
    document.body.appendChild(burst);
    setTimeout(()=>burst.remove(),900);
    // Chip animation
    card.classList.remove('bounce-anim','shake-anim','active-team');
    void card.offsetWidth;
    card.classList.add(delta>0?'bounce-anim':'shake-anim');
    setTimeout(()=>card.classList.remove('bounce-anim','shake-anim'),750);
  }
}

function closeModal() {
  clearTimerBar();
  document.getElementById('q-modal').classList.remove('active');
  if(currentCell){
    currentCell.cell.classList.add('used');
    currentCell.cell.innerHTML=`<div class="cell-pts" style="opacity:.2">${currentCell.pts}</div><div class="cell-check">✓</div>`;
    currentCell=null;
  }
  const cells=document.querySelectorAll('.q-cell');
  if([...cells].every(c=>c.classList.contains('used'))) setTimeout(endGame,600);
}

function startTimerBar(secs) {
  const wrap=document.getElementById('timer-bar-wrap');
  const fill=document.getElementById('timer-fill');
  wrap.style.display='block';
  fill.style.transition='none';fill.style.width='100%';fill.classList.remove('warning');
  let remaining=secs;
  setTimeout(()=>{fill.style.transition=`width ${secs}s linear`;fill.style.width='0%';},50);
  timerInterval=setInterval(()=>{
    remaining--;
    if(remaining<=Math.floor(secs*.3)) fill.classList.add('warning');
    if(remaining<=0){
      clearInterval(timerInterval);timerInterval=null;
      if(!document.getElementById('answer-box').classList.contains('shown')) revealAnswer();
    }
  },1000);
}

function clearTimerBar() {
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  document.getElementById('timer-bar-wrap').style.display='none';
  document.getElementById('timer-fill').style.width='100%';
  document.getElementById('timer-fill').classList.remove('warning');
}

function initCanvas() {
  const canvas=document.getElementById('drawing-canvas');
  canvas.width=canvas.offsetWidth||560;
  drawCtx=canvas.getContext('2d');
  drawCtx.clearRect(0,0,canvas.width,canvas.height);
  drawCtx.strokeStyle=drawColor;drawCtx.lineWidth=3;
  drawCtx.lineCap='round';drawCtx.lineJoin='round';
  canvas.onpointerdown=e=>{
    isDrawing=true;const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    drawCtx.beginPath();drawCtx.moveTo((e.clientX-r.left)*sx,(e.clientY-r.top)*sy);
    canvas.setPointerCapture(e.pointerId);
  };
  canvas.onpointermove=e=>{
    if(!isDrawing) return;const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    drawCtx.lineTo((e.clientX-r.left)*sx,(e.clientY-r.top)*sy);drawCtx.stroke();
  };
  canvas.onpointerup=()=>isDrawing=false;
}

function setDrawColor(btn) {
  drawColor=btn.dataset.color;
  if(drawCtx) drawCtx.strokeStyle=drawColor;
  document.querySelectorAll('.draw-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function clearCanvas() {
  if(drawCtx){const cv=document.getElementById('drawing-canvas');drawCtx.clearRect(0,0,cv.width,cv.height);}
}

function endGame() {
  const G=GT[lang];
  const sorted=[...teams].sort((a,b)=>b.score-a.score);
  const winner=sorted[0];
  // Pre-build winner screen content
  document.getElementById('winner-title').textContent=G.winner;
  document.getElementById('winner-name').textContent=winner.name;
  document.getElementById('winner-name').style.color=winner.color;
  document.getElementById('winner-pts').textContent=`${winner.score} ${G.pts}`;
  const fc=document.getElementById('final-cards');fc.innerHTML='';
  const medals=['🥇','🥈','🥉'];
  sorted.forEach((t,i)=>{
    const c=document.createElement('div');c.className='final-card';
    c.style.borderColor=t.color;c.style.color=t.color;
    c.innerHTML=`<div class="final-rank">${medals[i]||'#'+(i+1)}</div>
      <div class="final-name">${t.name}</div><div class="final-score">${t.score}</div>`;
    fc.appendChild(c);
  });
  document.getElementById('game-wrap').style.display='none';
  // 3-second mystery countdown
  const ms=document.getElementById('mystery-screen');
  document.getElementById('myst-label').textContent=G.calculating;
  const cnt=document.getElementById('myst-count');
  cnt.textContent='3';
  ms.classList.add('active');
  setTimeout(()=>{cnt.textContent='2';},1000);
  setTimeout(()=>{cnt.textContent='1';},2000);
  setTimeout(()=>{
    ms.classList.remove('active');
    document.getElementById('winner-screen').classList.add('active');
    document.getElementById('winner-screen').style.display='flex';
    launchConfetti();
  },3000);
}

/* ══════════ SCORE EDIT ══════════ */
let scoreEditIdx=null;

function editScore(idx){
  scoreEditIdx=idx;
  const t=teams[idx];
  const nm=document.getElementById('score-edit-name');
  const inp=document.getElementById('score-edit-input');
  nm.textContent=t.name;
  nm.style.color=t.color;
  nm.style.textShadow=`0 0 8px ${t.color}`;
  inp.style.borderColor=t.color;
  inp.value=t.score;
  document.getElementById('score-edit-overlay').classList.add('active');
  setTimeout(()=>{inp.focus();inp.select();},60);
}

function confirmScoreEdit(){
  if(scoreEditIdx===null) return;
  const inp=document.getElementById('score-edit-input');
  const val=parseInt(inp.value,10);
  if(!isNaN(val)){
    const old=teams[scoreEditIdx].score;
    teams[scoreEditIdx].score=val;
    const el=document.getElementById(`sv-${scoreEditIdx}`);
    if(el) el.textContent=val;
    const delta=val-old;
    if(delta!==0){
      const card=document.getElementById(`sc-${scoreEditIdx}`);
      if(card){
        const pop=document.createElement('div');
        pop.className='score-popup';
        pop.textContent=(delta>0?'+':'')+delta;
        pop.style.color=delta>0?'var(--primary)':'var(--danger)';
        card.appendChild(pop);
        setTimeout(()=>pop.remove(),1600);
      }
    }
  }
  closeScoreEdit();
}

function closeScoreEdit(){
  document.getElementById('score-edit-overlay').classList.remove('active');
  scoreEditIdx=null;
}

document.addEventListener('keydown',function(e){
  if(!document.getElementById('score-edit-overlay').classList.contains('active')) return;
  if(e.key==='Enter') confirmScoreEdit();
  if(e.key==='Escape') closeScoreEdit();
});

boot();
